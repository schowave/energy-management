views:
  # ════════════════════════════════════════════════════
  # Tab 1: Cockpit — Quick-Check + Steuerung
  # ════════════════════════════════════════════════════
  - type: sections
    title: "Cockpit"
    icon: mdi:home-lightning-bolt
    max_columns: 1
    sections:
      # ── Energiefluss ────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Energiefluss
          - type: custom:power-flow-card-plus
            entities:
              solar:
                entity: sensor.total_dc_power
                display_zero_state: true
              battery:
                entity: sensor.energy_battery_battery_discharging_power_battery_charging_power_net_power
                state_of_charge: sensor.battery_level
                display_zero_state: true
              grid:
                entity: sensor.energy_grid_import_power_export_power_net_power
                display_zero_state: true
              home:
                entity: sensor.load_power
                display_zero_state: true
            clickable_entities: true
            display_zero_lines:
              mode: show
            use_new_flow_rate_model: true
            w_decimals: 0
            kw_decimals: 1
            min_flow_rate: 0.75
            max_flow_rate: 6
            watt_threshold: 0
      # ── KPI-Chips ───────────────────────────────────────
      - type: grid
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:home-lightning-bolt
                icon_color: green
                content: "Autarkie {{ states('sensor.autarkiegrad') }}%"
                entity: sensor.autarkiegrad
              - type: template
                icon: mdi:solar-power-variant
                icon_color: orange
                content: "Eigen {{ states('sensor.eigenverbrauchsquote') }}%"
                entity: sensor.eigenverbrauchsquote
              - type: template
                icon: mdi:currency-eur
                icon_color: blue
                content: "{{ states('sensor.current_electricity_market_price') | float(0) | round(2) }} €/kWh"
                entity: sensor.current_electricity_market_price
      # ── Tagesbilanz-Chips ─────────────────────────────
      - type: grid
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: entity
                entity: sensor.daily_pv_generation
                icon: mdi:solar-power-variant
                icon_color: orange
                name: PV
              - type: entity
                entity: sensor.daily_imported_energy
                icon: mdi:transmission-tower-import
                icon_color: red
                name: Import
              - type: entity
                entity: sensor.daily_exported_energy
                icon: mdi:transmission-tower-export
                icon_color: green
                name: Export
              - type: entity
                entity: sensor.daily_battery_charge
                icon: mdi:battery-plus
                icon_color: green
                name: Geladen
              - type: entity
                entity: sensor.daily_battery_discharge
                icon: mdi:battery-minus
                icon_color: red
                name: Entladen
      # ── EMHASS-Empfehlung + Modus ──────────────────────
      - type: grid
        cards:
          - type: heading
            heading: EMHASS-Empfehlung
          - type: custom:mushroom-template-card
            primary: >-
              {% set p = states('sensor.p_batt_forecast') | float(0) %}
              {% if states('sensor.p_batt_forecast') in ['unknown', 'unavailable'] %}Akku: —
              {% elif p > 50 %}Akku laden · Ziel {{ states('sensor.soc_batt_forecast') | float(0) | round(0) }}%
              {% elif p < -50 %}Akku entladen · Ziel {{ states('sensor.soc_batt_forecast') | float(0) | round(0) }}%
              {% else %}Akku halten · SOC {{ states('sensor.soc_batt_forecast') | float(0) | round(0) }}%
              {% endif %}
            secondary: >-
              {% set status = states('sensor.optim_status') %}
              {% set last = state_attr('automation.emhass_day_ahead_optimierung', 'last_triggered') %}
              {% set gain = states('sensor.total_cost_fun_value') | float(0) | round(2) %}
              {% set mode = states('select.battery_forced_charge_discharge') %}
              {{ status if status not in ['unknown', 'unavailable', ''] else 'Keine Daten' }}
              · {{ gain }}€
              {% if last %} · {{ as_timestamp(last) | timestamp_custom('%H:%M') }}{% endif %}
              · {% if mode == 'Forced charge' %}Zwangsladen{% elif mode == 'Forced discharge' %}Zwangsentladen{% else %}Eigenverbrauch{% endif %}
            icon: mdi:robot
            icon_color: >-
              {% if states('sensor.optim_status') == 'Optimal' %}green
              {% elif states('sensor.optim_status') in ['unknown', 'unavailable', ''] %}grey
              {% else %}red{% endif %}
            entity: sensor.p_batt_forecast
            tap_action:
              action: more-info
              entity: sensor.p_batt_forecast
            badge_icon: >-
              {% set mode = states('select.battery_forced_charge_discharge') %}
              {% if mode == 'Forced charge' %}mdi:battery-arrow-up
              {% elif mode == 'Forced discharge' %}mdi:battery-arrow-down
              {% else %}mdi:battery-check{% endif %}
            badge_color: >-
              {% set mode = states('select.battery_forced_charge_discharge') %}
              {% if mode == 'Forced charge' %}orange
              {% else %}green{% endif %}
      # ── Batterie-Steuerung ──────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Batterie-Steuerung
          - type: button
            name: "1h / 5kW"
            icon: mdi:battery-arrow-up
            icon_height: 40px
            tap_action:
              action: call-service
              service: script.batterie_zwangsladen
              data:
                dauer_stunden: 1
                ladeleistung: 5000
              confirmation:
                text: "Batterie 1 Stunde mit 5 kW zwangsladen?"
          - type: button
            name: "2h / 5kW"
            icon: mdi:battery-clock
            icon_height: 40px
            tap_action:
              action: call-service
              service: script.batterie_zwangsladen
              data:
                dauer_stunden: 2
                ladeleistung: 5000
              confirmation:
                text: "Batterie 2 Stunden mit 5 kW zwangsladen?"
          - type: button
            name: "Stoppen"
            icon: mdi:battery-remove
            icon_height: 40px
            tap_action:
              action: call-service
              service: scene.turn_on
              target:
                entity_id: scene.self_consumption_mode_max_battery_discharge
              confirmation:
                text: "Zwangsladen abbrechen und auf Eigenverbrauch wechseln?"
          - type: button
            name: "Day-Ahead"
            icon: mdi:chart-timeline-variant-shimmer
            icon_height: 40px
            tap_action:
              action: call-service
              service: rest_command.emhass_dayahead
              confirmation:
                text: "EMHASS Day-Ahead Optimierung jetzt starten?"
          - type: button
            name: "Publish"
            icon: mdi:publish
            icon_height: 40px
            tap_action:
              action: call-service
              service: rest_command.emhass_publish
              confirmation:
                text: "EMHASS Sensoren in HA aktualisieren?"

  # ════════════════════════════════════════════════════
  # Tab 2: Analyse — Zeitreihen & Charts
  # ════════════════════════════════════════════════════
  - type: sections
    title: "Analyse"
    icon: mdi:chart-line
    max_columns: 3
    sections:
      # ── Zeitraum-Auswahl ────────────────────────────────
      - type: grid
        cards:
          - type: custom:mushroom-select-card
            entity: input_select.dashboard_zeitraum
            name: Zeitraum
            icon: mdi:calendar-range
            fill_container: true
      # ── Section 1: PV & Forecast ──────────────────────
      - type: grid
        cards:
          - type: heading
            heading: "PV & Forecast"
          - type: custom:apexcharts-card
            grid_options:
              columns: full
            header:
              show: true
              title: PV Real vs. Solcast Forecast
            graph_span: 24h
            span:
              start: day
            apex_config:
              chart:
                height: 300
              legend:
                show: true
              tooltip:
                shared: true
                intersect: false
            yaxis:
              - id: power
                min: 0
                apex_config:
                  title:
                    text: Watt
            series:
              - entity: sensor.total_dc_power
                name: PV Real
                color: "#f59e0b"
                stroke_width: 2
                curve: smooth
                extend_to: false
                group_by:
                  func: avg
                  duration: 5min
                yaxis_id: power
              - entity: sensor.solcast_pv_forecast_aktuelle_leistung
                name: "Forecast"
                color: "#2196F3"
                stroke_width: 0
                yaxis_id: power
                float_precision: 0
                show:
                  in_chart: false
                  in_header: raw
              - entity: sensor.solcast_pv_forecast_prognose_heute
                name: ""
                color: "#2196F3"
                stroke_width: 2
                curve: smooth
                yaxis_id: power
                show:
                  legend_value: false
                  in_header: false
                data_generator: |
                  return entity.attributes.detailedForecast.map(f => [
                    new Date(f.period_start).getTime(),
                    f.pv_estimate * 1000
                  ]);
              - entity: sensor.solcast_pv_forecast_prognose_heute
                name: Optimistisch (90)
                color: "#2196F3"
                stroke_width: 0
                type: area
                opacity: 0.15
                curve: smooth
                yaxis_id: power
                show:
                  legend_value: false
                  in_header: false
                data_generator: |
                  return entity.attributes.detailedForecast.map(f => [
                    new Date(f.period_start).getTime(),
                    f.pv_estimate90 * 1000
                  ]);
              - entity: sensor.solcast_pv_forecast_prognose_heute
                name: Pessimistisch (10)
                color: "#2196F3"
                stroke_width: 0
                type: area
                opacity: 0.15
                curve: smooth
                yaxis_id: power
                show:
                  legend_value: false
                  in_header: false
                data_generator: |
                  return entity.attributes.detailedForecast.map(f => [
                    new Date(f.period_start).getTime(),
                    f.pv_estimate10 * 1000
                  ]);
          - type: custom:apexcharts-card
            grid_options:
              columns: full
            header:
              show: true
              title: "MPPT1 (West) vs. MPPT2 (Ost)"
            graph_span: 24h
            apex_config:
              chart:
                height: 250
              legend:
                show: true
              tooltip:
                shared: true
                intersect: false
            yaxis:
              - id: power
                min: 0
                apex_config:
                  title:
                    text: Watt
            series:
              - entity: sensor.mppt1_power
                name: "MPPT1 (West)"
                color: "#2196F3"
                stroke_width: 2
                curve: smooth
                extend_to: false
                group_by:
                  func: avg
                  duration: 5min
                yaxis_id: power
              - entity: sensor.mppt2_power
                name: "MPPT2 (Ost)"
                color: "#FF9800"
                stroke_width: 2
                curve: smooth
                extend_to: false
                group_by:
                  func: avg
                  duration: 5min
                yaxis_id: power
          - type: custom:mushroom-chips-card
            chips:
              - type: entity
                entity: sensor.solcast_pv_forecast_prognose_heute
                icon: mdi:solar-power
                name: Heute
              - type: entity
                entity: sensor.solcast_pv_forecast_prognose_morgen
                icon: mdi:weather-sunny
                name: Morgen
              - type: entity
                entity: sensor.solcast_pv_forecast_prognose_verbleibende_leistung_heute
                icon: mdi:sun-clock
                name: Verbleibend
              - type: entity
                entity: sensor.daily_pv_generation
                icon: mdi:solar-power-variant
                name: Real heute

      # ── Section 2: Batterie & EMHASS-Plan ─────────────
      - type: grid
        cards:
          - type: heading
            heading: "Batterie & EMHASS-Plan"
          # ── Leistungsverlauf: Heute ──────────────────────
          - type: conditional
            conditions:
              - condition: state
                entity: input_select.dashboard_zeitraum
                state: "Heute"
            card:
              type: custom:apexcharts-card
              grid_options:
                columns: full
              header:
                show: true
                title: "Empfohlener Leistungsverlauf"
                show_states: true
                colorize_states: true
              now:
                show: true
                label: Jetzt
              graph_span: 24h
              span:
                start: day
              apex_config:
                chart:
                  height: 350
                legend:
                  show: true
                  position: bottom
                tooltip:
                  shared: true
                  intersect: false
              yaxis:
                - id: power
                  apex_config:
                    title:
                      text: Watt
                    labels:
                      formatter: |
                        EVAL:function(val) { return val ? Math.round(val) : '0'; }
              series:
                - entity: sensor.total_dc_power
                  name: "PV Real"
                  color: "#f59e0b"
                  stroke_width: 2
                  curve: smooth
                  type: area
                  opacity: 0.25
                  float_precision: 0
                  yaxis_id: power
                  show:
                    in_header: raw
                  extend_to: false
                  group_by:
                    func: avg
                    duration: 30min
                - entity: sensor.p_pv_forecast
                  name: "PV Forecast"
                  color: "#d97706"
                  stroke_width: 2
                  stroke_dash: 5
                  curve: stepline
                  float_precision: 0
                  yaxis_id: power
                  show:
                    in_header: false
                    legend_value: false
                  data_generator: |
                    var now = Date.now();
                    var fc = entity.attributes.forecasts || [];
                    return fc.filter((e) => new Date(e.date).getTime() >= now)
                      .map((e) => [new Date(e.date).getTime(), parseFloat(e.p_pv_forecast)]);
                - entity: sensor.load_power
                  name: "Hausverbrauch Real"
                  color: "#ec4899"
                  stroke_width: 2
                  curve: smooth
                  type: area
                  opacity: 0.15
                  float_precision: 0
                  yaxis_id: power
                  show:
                    in_header: raw
                  extend_to: false
                  group_by:
                    func: avg
                    duration: 30min
                - entity: sensor.p_load_forecast
                  name: "Verbrauch Forecast"
                  color: "#be185d"
                  stroke_width: 2
                  stroke_dash: 5
                  curve: stepline
                  float_precision: 0
                  yaxis_id: power
                  show:
                    in_header: false
                    legend_value: false
                  data_generator: |
                    var now = Date.now();
                    var fc = entity.attributes.forecasts || [];
                    return fc.filter((e) => new Date(e.date).getTime() >= now)
                      .map((e) => [new Date(e.date).getTime(), parseFloat(e.p_load_forecast)]);
                - entity: sensor.p_batt_forecast
                  name: "Akku (+Entladen / −Laden)"
                  color: "#22c55e"
                  stroke_width: 2
                  curve: stepline
                  float_precision: 0
                  yaxis_id: power
                  show:
                    in_header: raw
                  extend_to: false
                  group_by:
                    func: last
                    duration: 30min
                - entity: sensor.energy_grid_import_power_export_power_net_power
                  name: "Netz Real"
                  color: "#06b6d4"
                  stroke_width: 2
                  curve: smooth
                  float_precision: 0
                  yaxis_id: power
                  show:
                    in_header: raw
                  extend_to: false
                  group_by:
                    func: avg
                    duration: 30min
                - entity: sensor.p_grid_forecast
                  name: "Netz Forecast"
                  color: "#0891b2"
                  stroke_width: 2
                  stroke_dash: 5
                  curve: stepline
                  float_precision: 0
                  yaxis_id: power
                  show:
                    in_header: false
                    legend_value: false
                  data_generator: |
                    var now = Date.now();
                    var fc = entity.attributes.forecasts || [];
                    return fc.filter((e) => new Date(e.date).getTime() >= now)
                      .map((e) => [new Date(e.date).getTime(), parseFloat(e.p_grid_forecast)]);
          # ── Leistungsverlauf: 3 Tage ─────────────────────
          - type: conditional
            conditions:
              - condition: state
                entity: input_select.dashboard_zeitraum
                state: "3 Tage"
            card:
              type: custom:apexcharts-card
              grid_options:
                columns: full
              header:
                show: true
                title: "Leistungsverlauf (3 Tage)"
              graph_span: 3d
              apex_config:
                chart:
                  height: 350
                legend:
                  show: true
                  position: bottom
                tooltip:
                  shared: true
                  intersect: false
              yaxis:
                - id: power
                  min: 0
                  apex_config:
                    title:
                      text: Watt
              series:
                - entity: sensor.total_dc_power
                  name: "PV"
                  color: "#f59e0b"
                  stroke_width: 2
                  curve: smooth
                  type: area
                  opacity: 0.25
                  extend_to: false
                  group_by:
                    func: avg
                    duration: 1h
                  yaxis_id: power
                - entity: sensor.load_power
                  name: "Hausverbrauch"
                  color: "#ec4899"
                  stroke_width: 2
                  curve: smooth
                  type: area
                  opacity: 0.15
                  extend_to: false
                  group_by:
                    func: avg
                    duration: 1h
                  yaxis_id: power
                - entity: sensor.p_batt_forecast
                  name: "Akku"
                  color: "#22c55e"
                  stroke_width: 2
                  curve: stepline
                  extend_to: false
                  group_by:
                    func: last
                    duration: 1h
                  yaxis_id: power
                - entity: sensor.energy_grid_import_power_export_power_net_power
                  name: "Netz"
                  color: "#06b6d4"
                  stroke_width: 2
                  curve: smooth
                  extend_to: false
                  group_by:
                    func: avg
                    duration: 1h
                  yaxis_id: power
          # ── Leistungsverlauf: 7 Tage ─────────────────────
          - type: conditional
            conditions:
              - condition: state
                entity: input_select.dashboard_zeitraum
                state: "7 Tage"
            card:
              type: custom:apexcharts-card
              grid_options:
                columns: full
              header:
                show: true
                title: "Leistungsverlauf (7 Tage)"
              graph_span: 7d
              apex_config:
                chart:
                  height: 350
                legend:
                  show: true
                  position: bottom
                tooltip:
                  shared: true
                  intersect: false
              yaxis:
                - id: power
                  min: 0
                  apex_config:
                    title:
                      text: Watt
              series:
                - entity: sensor.total_dc_power
                  name: "PV"
                  color: "#f59e0b"
                  stroke_width: 2
                  curve: smooth
                  type: area
                  opacity: 0.25
                  extend_to: false
                  group_by:
                    func: avg
                    duration: 2h
                  yaxis_id: power
                - entity: sensor.load_power
                  name: "Hausverbrauch"
                  color: "#ec4899"
                  stroke_width: 2
                  curve: smooth
                  type: area
                  opacity: 0.15
                  extend_to: false
                  group_by:
                    func: avg
                    duration: 2h
                  yaxis_id: power
                - entity: sensor.p_batt_forecast
                  name: "Akku"
                  color: "#22c55e"
                  stroke_width: 2
                  curve: stepline
                  extend_to: false
                  group_by:
                    func: last
                    duration: 2h
                  yaxis_id: power
                - entity: sensor.energy_grid_import_power_export_power_net_power
                  name: "Netz"
                  color: "#06b6d4"
                  stroke_width: 2
                  curve: smooth
                  extend_to: false
                  group_by:
                    func: avg
                    duration: 2h
                  yaxis_id: power
          # ── Akkustand: Heute ────────────────────────────
          - type: conditional
            conditions:
              - condition: state
                entity: input_select.dashboard_zeitraum
                state: "Heute"
            card:
              type: custom:apexcharts-card
              grid_options:
                columns: full
              header:
                show: true
                title: "Akkustand: Empfehlung vs. Realität"
              now:
                show: true
                label: Jetzt
              graph_span: 24h
              span:
                start: day
              apex_config:
                chart:
                  height: 220
                legend:
                  show: true
                tooltip:
                  shared: true
                  intersect: false
              yaxis:
                - id: soc
                  min: 0
                  max: 100
                  apex_config:
                    title:
                      text: "%"
              series:
                - entity: sensor.soc_batt_forecast
                  name: "Empfehlung"
                  color: "#4CAF50"
                  stroke_width: 2
                  curve: stepline
                  extend_to: false
                  yaxis_id: soc
                  group_by:
                    func: last
                    duration: 5min
                - entity: sensor.soc_batt_forecast
                  name: "Empfehlung (Forecast)"
                  color: "#4CAF50"
                  stroke_width: 2
                  curve: stepline
                  extend_to: false
                  yaxis_id: soc
                  show:
                    in_header: false
                    legend_value: false
                  data_generator: |
                    var now = Date.now();
                    var fc = entity.attributes.battery_scheduled_soc || [];
                    return fc.filter((e) => new Date(e.date).getTime() >= now)
                      .map((e) => [new Date(e.date).getTime(), parseFloat(e.soc_batt_forecast)]);
                - entity: sensor.battery_level
                  name: "Aktuell (Heartbeat)"
                  color: "#FF9800"
                  stroke_width: 2
                  curve: smooth
                  extend_to: false
                  yaxis_id: soc
                  group_by:
                    func: avg
                    duration: 5min
                - entity: input_number.emhass_theo_soc
                  name: "Simulation (EMHASS)"
                  color: "#2196F3"
                  stroke_width: 2
                  curve: smooth
                  extend_to: false
                  yaxis_id: soc
                  group_by:
                    func: avg
                    duration: 5min
          # ── Akkustand: 3 Tage ────────────────────────────
          - type: conditional
            conditions:
              - condition: state
                entity: input_select.dashboard_zeitraum
                state: "3 Tage"
            card:
              type: custom:apexcharts-card
              grid_options:
                columns: full
              header:
                show: true
                title: "Akkustand (3 Tage)"
              graph_span: 3d
              apex_config:
                chart:
                  height: 220
                legend:
                  show: true
                tooltip:
                  shared: true
                  intersect: false
              yaxis:
                - id: soc
                  min: 0
                  max: 100
                  apex_config:
                    title:
                      text: "%"
              series:
                - entity: sensor.battery_level
                  name: "Akkustand"
                  color: "#FF9800"
                  stroke_width: 2
                  curve: smooth
                  type: area
                  opacity: 0.2
                  extend_to: false
                  yaxis_id: soc
                  group_by:
                    func: avg
                    duration: 30min
          # ── Akkustand: 7 Tage ────────────────────────────
          - type: conditional
            conditions:
              - condition: state
                entity: input_select.dashboard_zeitraum
                state: "7 Tage"
            card:
              type: custom:apexcharts-card
              grid_options:
                columns: full
              header:
                show: true
                title: "Akkustand (7 Tage)"
              graph_span: 7d
              apex_config:
                chart:
                  height: 220
                legend:
                  show: true
                tooltip:
                  shared: true
                  intersect: false
              yaxis:
                - id: soc
                  min: 0
                  max: 100
                  apex_config:
                    title:
                      text: "%"
              series:
                - entity: sensor.battery_level
                  name: "Akkustand"
                  color: "#FF9800"
                  stroke_width: 2
                  curve: smooth
                  type: area
                  opacity: 0.2
                  extend_to: false
                  yaxis_id: soc
                  group_by:
                    func: avg
                    duration: 1h
          - type: custom:apexcharts-card
            grid_options:
              columns: full
            header:
              show: true
              title: Batterie Lade-/Entladeleistung
            graph_span: 24h
            apex_config:
              chart:
                height: 250
              legend:
                show: true
              tooltip:
                shared: true
                intersect: false
            series:
              - entity: sensor.battery_charging_power
                name: Laden
                color: "#4CAF50"
                type: column
                group_by:
                  func: avg
                  duration: 15min
              - entity: sensor.battery_discharging_power
                name: Entladen
                color: "#F44336"
                type: column
                invert: true
                group_by:
                  func: avg
                  duration: 15min
          - type: custom:mushroom-chips-card
            chips:
              - type: entity
                entity: sensor.daily_battery_charge
                icon: mdi:battery-plus
                name: Geladen
              - type: entity
                entity: sensor.daily_battery_discharge
                icon: mdi:battery-minus
                name: Entladen

      # ── Section 3: Netz & Strompreis ──────────────────
      - type: grid
        cards:
          - type: heading
            heading: "Netz & Strompreis"
          - type: custom:apexcharts-card
            grid_options:
              columns: full
            header:
              show: true
              title: Netzbezug / Einspeisung
            graph_span: 24h
            apex_config:
              chart:
                height: 250
              legend:
                show: true
              tooltip:
                shared: true
                intersect: false
            series:
              - entity: sensor.import_power
                name: Bezug
                color: "#F44336"
                type: column
                group_by:
                  func: avg
                  duration: 15min
              - entity: sensor.export_power
                name: Einspeisung
                color: "#4CAF50"
                type: column
                invert: true
                group_by:
                  func: avg
                  duration: 15min
          # ── Preisverlauf: Heute ──────────────────────────
          - type: conditional
            conditions:
              - condition: state
                entity: input_select.dashboard_zeitraum
                state: "Heute"
            card:
              type: custom:apexcharts-card
              grid_options:
                columns: full
              now:
                show: true
                label: Jetzt
              header:
                show: true
                title: "Preisverlauf: 1komma5° vs. ENTSO-e Börse"
              graph_span: 24h
              span:
                start: day
              apex_config:
                chart:
                  height: 280
                legend:
                  show: true
                tooltip:
                  shared: true
                  intersect: false
              yaxis:
                - id: price
                  min: 0
                  apex_config:
                    title:
                      text: EUR/kWh
                    labels:
                      formatter: |
                        EVAL:function(val) { return val ? val.toFixed(2) : '0'; }
              series:
                - entity: sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45
                  name: "1komma5° Real"
                  color: "#4CAF50"
                  stroke_width: 2
                  float_precision: 2
                  extend_to: false
                  yaxis_id: price
                  group_by:
                    func: avg
                    duration: 5min
                - entity: sensor.1komma5_tagesforecast
                  name: "1komma5° Forecast"
                  color: "#4CAF50"
                  stroke_width: 1
                  curve: stepline
                  float_precision: 2
                  opacity: 0.5
                  yaxis_id: price
                  data_generator: |
                    const mp = parseFloat(entity.attributes.midnight_price) || 0;
                    const raw = entity.attributes.forecast_json || [];
                    const fc = typeof raw === 'string' ? JSON.parse(raw) : raw;
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    const points = [[today.getTime(), mp]];
                    fc.forEach(f => points.push([
                      new Date(f.datetime).getTime(),
                      f.price
                    ]));
                    return points;
                - entity: sensor.current_electricity_market_price
                  name: "ENTSO-e Börse"
                  color: "#FF9800"
                  stroke_width: 2
                  curve: stepline
                  float_precision: 2
                  extend_to: false
                  yaxis_id: price
                  group_by:
                    func: avg
                    duration: 60min
                - entity: sensor.average_electricity_price
                  name: "ENTSO-e Forecast"
                  color: "#FF9800"
                  stroke_width: 1
                  curve: stepline
                  float_precision: 2
                  opacity: 0.5
                  yaxis_id: price
                  data_generator: |
                    const today = entity.attributes.prices_today || [];
                    const tomorrow = entity.attributes.prices_tomorrow || [];
                    const all = [...today, ...tomorrow];
                    return all.map(f => [
                      new Date(f.time).getTime(),
                      f.price
                    ]);
          # ── Preisverlauf: 3 Tage ─────────────────────────
          - type: conditional
            conditions:
              - condition: state
                entity: input_select.dashboard_zeitraum
                state: "3 Tage"
            card:
              type: custom:apexcharts-card
              grid_options:
                columns: full
              header:
                show: true
                title: "Preisverlauf (3 Tage)"
              graph_span: 3d
              apex_config:
                chart:
                  height: 280
                legend:
                  show: true
                tooltip:
                  shared: true
                  intersect: false
              yaxis:
                - id: price
                  min: 0
                  apex_config:
                    title:
                      text: EUR/kWh
                    labels:
                      formatter: |
                        EVAL:function(val) { return val ? val.toFixed(2) : '0'; }
              series:
                - entity: sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45
                  name: "1komma5°"
                  color: "#4CAF50"
                  stroke_width: 2
                  float_precision: 2
                  extend_to: false
                  yaxis_id: price
                  group_by:
                    func: avg
                    duration: 15min
                - entity: sensor.current_electricity_market_price
                  name: "ENTSO-e"
                  color: "#FF9800"
                  stroke_width: 2
                  curve: stepline
                  float_precision: 2
                  extend_to: false
                  yaxis_id: price
                  group_by:
                    func: avg
                    duration: 60min
          # ── Preisverlauf: 7 Tage ─────────────────────────
          - type: conditional
            conditions:
              - condition: state
                entity: input_select.dashboard_zeitraum
                state: "7 Tage"
            card:
              type: custom:apexcharts-card
              grid_options:
                columns: full
              header:
                show: true
                title: "Preisverlauf (7 Tage)"
              graph_span: 7d
              apex_config:
                chart:
                  height: 280
                legend:
                  show: true
                tooltip:
                  shared: true
                  intersect: false
              yaxis:
                - id: price
                  min: 0
                  apex_config:
                    title:
                      text: EUR/kWh
                    labels:
                      formatter: |
                        EVAL:function(val) { return val ? val.toFixed(2) : '0'; }
              series:
                - entity: sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45
                  name: "1komma5°"
                  color: "#4CAF50"
                  stroke_width: 2
                  float_precision: 2
                  extend_to: false
                  yaxis_id: price
                  group_by:
                    func: avg
                    duration: 30min
                - entity: sensor.current_electricity_market_price
                  name: "ENTSO-e"
                  color: "#FF9800"
                  stroke_width: 2
                  curve: stepline
                  float_precision: 2
                  extend_to: false
                  yaxis_id: price
                  group_by:
                    func: avg
                    duration: 60min
          - type: markdown
            content: |
              {% set hour = state_attr('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45', 'cheapest_upcoming_hour') %}
              {% set price = state_attr('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45', 'cheapest_upcoming_price') %}
              {% if hour and price %}
              🕐 Günstigste (1k5): **{{ as_timestamp(hour) | timestamp_custom('%H:%M') }} Uhr** — {{ price }} EUR/kWh
              {% else %}
              🕐 Keine günstigere Stunde mehr heute
              {% endif %}
              {% set diff = states('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45') | float(0) - states('sensor.current_electricity_market_price') | float(0) %}
              💰 Aufschlag 1komma5° vs. Börse: **{{ (diff * 100) | round(1) }} ct/kWh**
          - type: custom:mushroom-entity-card
            entity: sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45
            name: "1komma5° aktuell"
            icon: mdi:lightning-bolt
            icon_color: green
          - type: custom:mushroom-entity-card
            entity: sensor.current_electricity_market_price
            name: "ENTSO-e aktuell"
            icon: mdi:currency-eur
            icon_color: orange
          - type: custom:mushroom-entity-card
            entity: sensor.lowest_energy_price
            name: "ENTSO-e Minimum"
            icon: mdi:arrow-down-bold
            icon_color: green
          - type: custom:mushroom-entity-card
            entity: sensor.highest_energy_price
            name: "ENTSO-e Maximum"
            icon: mdi:arrow-up-bold
            icon_color: red
          - type: custom:mushroom-chips-card
            chips:
              - type: entity
                entity: sensor.daily_imported_energy
                icon: mdi:transmission-tower-import
                name: Import heute
              - type: entity
                entity: sensor.daily_exported_energy
                icon: mdi:transmission-tower-export
                name: Export heute

      # ── Section 4: Verbrauch ──────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: "Verbrauch"
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.load_power') }} W"
            secondary: "Hausverbrauch"
            icon: mdi:home
            icon_color: >-
              {% set p = states('sensor.load_power') | float(0) %}
              {% if p < 2000 %}green{% elif p < 3500 %}amber{% else %}red{% endif %}
            entity: sensor.load_power
          - type: custom:apexcharts-card
            grid_options:
              columns: full
            header:
              show: true
              title: Energiequellen Hausverbrauch
            graph_span: 24h
            apex_config:
              chart:
                height: 250
                stacked: true
              legend:
                show: true
              tooltip:
                shared: true
                intersect: false
            yaxis:
              - id: power
                min: 0
                apex_config:
                  title:
                    text: Watt
            series:
              - entity: sensor.total_dc_power
                name: PV-Eigenverbrauch
                color: "#f59e0b"
                stroke_width: 0
                type: area
                opacity: 0.7
                curve: smooth
                extend_to: false
                group_by:
                  func: avg
                  duration: 15min
                yaxis_id: power
              - entity: sensor.battery_discharging_power
                name: Batterie
                color: "#22c55e"
                stroke_width: 0
                type: area
                opacity: 0.7
                curve: smooth
                extend_to: false
                group_by:
                  func: avg
                  duration: 15min
                yaxis_id: power
              - entity: sensor.import_power
                name: Netzbezug
                color: "#F44336"
                stroke_width: 0
                type: area
                opacity: 0.7
                curve: smooth
                extend_to: false
                group_by:
                  func: avg
                  duration: 15min
                yaxis_id: power
          - type: custom:apexcharts-card
            grid_options:
              columns: full
            header:
              show: true
              title: "Tagesbilanz: Erzeugung vs. Bezug/Einspeisung"
            graph_span: 24h
            apex_config:
              chart:
                height: 250
              legend:
                show: true
              tooltip:
                shared: true
                intersect: false
            yaxis:
              - id: energy
                min: 0
                apex_config:
                  title:
                    text: kWh
            series:
              - entity: sensor.daily_pv_generation
                name: "PV-Erzeugung"
                color: "#f59e0b"
                stroke_width: 2
                curve: smooth
                extend_to: false
                yaxis_id: energy
              - entity: sensor.daily_imported_energy
                name: "Netzbezug"
                color: "#F44336"
                type: area
                opacity: 0.3
                stroke_width: 2
                curve: smooth
                extend_to: false
                yaxis_id: energy
              - entity: sensor.daily_exported_energy
                name: "Einspeisung"
                color: "#4CAF50"
                type: area
                opacity: 0.3
                stroke_width: 2
                curve: smooth
                extend_to: false
                yaxis_id: energy
          - type: custom:mushroom-template-card
            grid_options:
              columns: full
            primary: "Grundlast-Übersicht"
            secondary: >-
              Serverschrank {{ states('sensor.kg_technik_serverschrank_leistung') }} W
              · Kühlschrank {{ states('sensor.kg_flur_kuehlschrank_leistung') }} W
              · Workstation {{ states('sensor.dg_buero_workstation_leistung') }} W
            icon: mdi:power-plug
            icon_color: blue
          - type: custom:mushroom-entity-card
            entity: sensor.kg_technik_serverschrank_leistung
            name: Serverschrank
            icon: mdi:server
            icon_color: blue
          - type: custom:mushroom-entity-card
            entity: sensor.kg_flur_kuehlschrank_leistung
            name: Kühlschrank
            icon: mdi:fridge
            icon_color: cyan
          - type: custom:mushroom-entity-card
            entity: sensor.dg_buero_workstation_leistung
            name: Workstation
            icon: mdi:desktop-tower-monitor
            icon_color: purple
          - type: custom:mushroom-entity-card
            entity: sensor.kg_technik_waschmaschine_leistung
            name: Waschmaschine
            icon: mdi:washing-machine
            icon_color: teal
          - type: custom:mushroom-entity-card
            entity: sensor.kg_technik_trockner_leistung
            name: Trockner
            icon: mdi:tumble-dryer
            icon_color: orange

      # ── Section 5: Hardware ───────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: "Hardware"
          - type: custom:mushroom-entity-card
            entity: sensor.battery_temperature
            name: Batterie-Temperatur
            icon: mdi:thermometer
            icon_color: >-
              {% set t = states('sensor.battery_temperature') | float(0) %}
              {% if t > 40 %}red{% elif t > 35 %}amber{% else %}green{% endif %}
          - type: custom:mushroom-entity-card
            entity: sensor.inverter_temperature
            name: Wechselrichter-Temperatur
            icon: mdi:thermometer
            icon_color: >-
              {% set t = states('sensor.inverter_temperature') | float(0) %}
              {% if t > 55 %}red{% elif t > 45 %}amber{% else %}green{% endif %}
          - type: custom:mushroom-entity-card
            entity: sensor.battery_state_of_health
            name: "Batterie SOH"
            icon: mdi:battery-heart-variant
            icon_color: >-
              {% set soh = states('sensor.battery_state_of_health') | float(100) %}
              {% if soh < 80 %}red{% elif soh < 90 %}amber{% else %}green{% endif %}

  # ════════════════════════════════════════════════════
  # Tab 3: Wärmepumpe — Novelan LICV 8.2 via Luxtronik2
  # ════════════════════════════════════════════════════
  - type: sections
    title: "Wärmepumpe"
    icon: mdi:heat-pump-outline
    max_columns: 2
    sections:
      # ── Status + Temperaturen ──────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: "Status & Temperaturen"
          - type: custom:mushroom-template-card
            primary: >-
              {% set s = states('sensor.luxtronik_341205_065_status') %}
              {% set m = {'heating': 'Heizen', 'hot water': 'Warmwasser', 'cooling': 'Kühlen', 'defrost': 'Abtauen', 'standby': 'Standby', 'no_request': 'Standby', 'error': 'Fehler', 'evu': 'EVU-Sperre'} %}
              {{ m.get(s, s | capitalize) }} · {{ states('sensor.kg_technik_waermepumpe_3em_leistung') | float(0) | round(0) }} W
            secondary: >-
              {% set cap = states('sensor.licv_8_2r1_3_heating_capacity') | float(0) %}
              {% set pow = states('sensor.kg_technik_waermepumpe_3em_leistung') | float(0) / 1000 %}
              {% if pow > 0.1 and cap > 0 %}COP {{ (cap / pow) | round(1) }} · {{ cap }} kW therm.
              {% elif pow > 0.1 %}Verdichter läuft
              {% else %}Standby{% endif %}
              {% if is_state('binary_sensor.luxtronik_341205_065_compressor_heater', 'on') %} · Heizstab!{% endif %}
            icon: >-
              {% set s = states('sensor.luxtronik_341205_065_status') %}
              {% if s == 'heating' %}mdi:radiator{% elif s == 'hot water' %}mdi:water-boiler{% elif s == 'defrost' %}mdi:snowflake-melt{% elif s == 'error' %}mdi:alert{% else %}mdi:heat-pump-outline{% endif %}
            icon_color: >-
              {% set p = states('sensor.kg_technik_waermepumpe_3em_leistung') | float(0) %}
              {% if p < 100 %}grey{% elif p < 2000 %}blue{% else %}red{% endif %}
            entity: sensor.kg_technik_waermepumpe_3em_leistung
          - type: custom:mushroom-chips-card
            grid_options:
              columns: full
            chips:
              - type: template
                content: "VL {{ states('sensor.luxtronik_341205_065_flow_in_temperature') }}°C"
                icon: mdi:thermometer-chevron-up
                icon_color: red
                entity: sensor.luxtronik_341205_065_flow_in_temperature
              - type: template
                content: "RL {{ states('sensor.luxtronik_341205_065_flow_out_temperature') }}°C → Soll {{ states('sensor.luxtronik_341205_065_flow_out_temperature_target') }}°C"
                icon: mdi:thermometer-chevron-down
                icon_color: blue
                entity: sensor.luxtronik_341205_065_flow_out_temperature
              - type: template
                content: "WW {{ states('sensor.luxtronik_341205_065_dhw_temperature') }}°C"
                icon: mdi:water-thermometer
                icon_color: orange
                entity: sensor.luxtronik_341205_065_dhw_temperature
              - type: template
                content: "Außen {{ states('sensor.luxtronik_341205_065_outdoor_temperature') }}°C"
                icon: mdi:home-thermometer-outline
                icon_color: green
                entity: sensor.luxtronik_341205_065_outdoor_temperature
          - type: custom:mushroom-chips-card
            grid_options:
              columns: full
            chips:
              - type: template
                content: "Verdichter {{ 'AN' if is_state('binary_sensor.luxtronik_341205_065_compressor', 'on') else 'AUS' }}"
                icon: mdi:heat-pump
                icon_color: "{{ 'blue' if is_state('binary_sensor.luxtronik_341205_065_compressor', 'on') else 'grey' }}"
                entity: binary_sensor.luxtronik_341205_065_compressor
              - type: template
                content: "HUP {{ 'AN' if is_state('binary_sensor.luxtronik_341205_065_circulation_pump_heating', 'on') else 'AUS' }}"
                icon: mdi:pump
                icon_color: "{{ 'cyan' if is_state('binary_sensor.luxtronik_341205_065_circulation_pump_heating', 'on') else 'grey' }}"
                entity: binary_sensor.luxtronik_341205_065_circulation_pump_heating
              - type: template
                content: "EVU {{ 'Frei' if is_state('binary_sensor.luxtronik_341205_065_evu_unlocked', 'on') else 'Sperre!' }}"
                icon: mdi:transmission-tower
                icon_color: "{{ 'green' if is_state('binary_sensor.luxtronik_341205_065_evu_unlocked', 'on') else 'red' }}"
                entity: binary_sensor.luxtronik_341205_065_evu_unlocked
              - type: template
                content: "{{ 'Alarm!' if is_state('binary_sensor.luxtronik_341205_065_disturbance_output', 'on') else 'OK' }}"
                icon: "{{ 'mdi:alert-circle' if is_state('binary_sensor.luxtronik_341205_065_disturbance_output', 'on') else 'mdi:check-circle' }}"
                icon_color: "{{ 'red' if is_state('binary_sensor.luxtronik_341205_065_disturbance_output', 'on') else 'green' }}"
                entity: binary_sensor.luxtronik_341205_065_disturbance_output

      # ── Steuerung ────────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: "Steuerung"
          - type: custom:mushroom-climate-card
            entity: climate.luxtronik_341205_065_heating
            name: Heizung
            icon: mdi:radiator
            show_temperature_control: true
          - type: custom:mushroom-select-card
            entity: select.luxtronik_341205_065_heating_mode
            name: Heizmodus
            icon: mdi:thermostat
          - type: custom:mushroom-select-card
            entity: select.luxtronik_341205_065_dhw_mode
            name: WW-Modus
            icon: mdi:water-boiler-auto
          - type: custom:mushroom-number-card
            entity: number.luxtronik_341205_065_dhw_target_temperature
            name: Warmwasser Soll
            icon: mdi:thermometer-water
            icon_color: orange
            display_mode: buttons
          - type: custom:mushroom-number-card
            entity: number.luxtronik_341205_065_heating_curve_end_temperature
            name: Heizkurve Endpunkt
            icon: mdi:chart-bell-curve-cumulative
            display_mode: buttons
          - type: custom:mushroom-number-card
            entity: number.luxtronik_341205_065_heating_curve_parallel_shift_temperature
            name: Heizkurve Parallelverschiebung
            icon: mdi:arrow-up-down
            display_mode: buttons
          - type: custom:mushroom-number-card
            entity: number.luxtronik_341205_065_electrical_power_limitation_value
            name: Leistungslimit
            icon: mdi:speedometer
            icon_color: red
            display_mode: buttons
          - type: custom:mushroom-number-card
            entity: number.luxtronik_341205_065_heating_curve_night_temperature
            name: Heizkurve Nachtabsenkung
            icon: mdi:weather-night
            display_mode: buttons
          - type: custom:mushroom-number-card
            entity: number.luxtronik_341205_065_heating_threshold_temperature
            name: Heizgrenze (Außentemp.)
            icon: mdi:thermometer-alert
            display_mode: buttons
          - type: custom:mushroom-entity-card
            entity: switch.luxtronik_341205_065_smartgrid
            name: "SG-Ready (Lokal)"
            icon: mdi:transmission-tower
            icon_color: >-
              {{ 'green' if is_state('switch.luxtronik_341205_065_smartgrid', 'on') else 'grey' }}
            tap_action:
              action: toggle
              confirmation:
                text: "Smart Grid umschalten? ON = Erhöhter Betrieb, OFF = Normal"
          - type: custom:mushroom-template-card
            primary: >-
              SG-Ready: {% if is_state('switch.luxtronik_341205_065_smartgrid', 'on') %}Erhöhter Betrieb{% else %}Normalbetrieb{% endif %}
            secondary: >-
              {% if is_state('switch.luxtronik_341205_065_smartgrid', 'on') %}WP läuft mit erhöhter Leistung (PV-Überschuss/günstiger Strom)
              {% else %}WP im Normalbetrieb · Tap zum Aktivieren{% endif %}
            icon: mdi:lightning-bolt-circle
            icon_color: >-
              {% if is_state('switch.luxtronik_341205_065_smartgrid', 'on') %}green{% else %}grey{% endif %}
            entity: switch.luxtronik_341205_065_smartgrid
          - type: custom:mushroom-template-card
            primary: >-
              WW Energie: {{ states('sensor.luxtronik_341205_065_dhw_energy_input') }} kWh
            secondary: >-
              {% set th = states('sensor.luxtronik_341205_065_dhw_heat_amount') | float(0) %}
              {% set el = states('sensor.luxtronik_341205_065_dhw_energy_input') | float(0) %}
              {% if el > 1 %}WW-COP (Luxtronik): {{ (th / el) | round(2) }}{% else %}Keine Daten{% endif %}
            icon: mdi:water-boiler-alert
            icon_color: orange
            entity: sensor.luxtronik_341205_065_dhw_energy_input

      # ── Section 4: Diagnose & Statistik ────────────────
      - type: grid
        cards:
          - type: heading
            heading: "Diagnose & Statistik"
          - type: custom:apexcharts-card
            grid_options:
              columns: full
            header:
              show: true
              title: Temperaturen
            graph_span: 24h
            apex_config:
              chart:
                height: 250
              legend:
                show: true
              tooltip:
                shared: true
                intersect: false
            yaxis:
              - id: temp
                apex_config:
                  title:
                    text: "°C"
            series:
              - entity: sensor.licv_8_2r1_3_flow
                name: Vorlauf
                color: "#F44336"
                stroke_width: 2
                curve: smooth
                extend_to: false
                group_by:
                  func: avg
                  duration: 5min
                yaxis_id: temp
              - entity: sensor.luxtronik_341205_065_flow_out_temperature
                name: Rücklauf
                color: "#2196F3"
                stroke_width: 2
                curve: smooth
                extend_to: false
                group_by:
                  func: avg
                  duration: 5min
                yaxis_id: temp
              - entity: sensor.luxtronik_341205_065_dhw_temperature
                name: Warmwasser
                color: "#FF9800"
                stroke_width: 2
                curve: smooth
                extend_to: false
                group_by:
                  func: avg
                  duration: 5min
                yaxis_id: temp
              - entity: sensor.luxtronik_341205_065_suction_compressor_temperature
                name: Wärmequelle
                color: "#009688"
                stroke_width: 1
                curve: smooth
                extend_to: false
                group_by:
                  func: avg
                  duration: 5min
                yaxis_id: temp
              - entity: sensor.luxtronik_341205_065_flow_out_temperature_target
                name: Soll Rücklauf
                color: "#2196F3"
                stroke_width: 1
                stroke_dash: 4
                curve: stepline
                extend_to: false
                group_by:
                  func: last
                  duration: 5min
                yaxis_id: temp
              - entity: sensor.luxtronik_341205_065_outdoor_temperature
                name: Außen
                color: "#4CAF50"
                stroke_width: 1
                curve: smooth
                extend_to: false
                group_by:
                  func: avg
                  duration: 5min
                yaxis_id: temp
          - type: custom:apexcharts-card
            grid_options:
              columns: full
            header:
              show: true
              title: Stromverbrauch WP (Shelly 3EM)
            graph_span: 24h
            apex_config:
              chart:
                height: 200
              legend:
                show: false
              tooltip:
                shared: true
                intersect: false
            yaxis:
              - id: power
                min: 0
                apex_config:
                  title:
                    text: Watt
            series:
              - entity: sensor.kg_technik_waermepumpe_3em_leistung
                name: Verbrauch
                color: "#2196F3"
                stroke_width: 2
                curve: smooth
                type: area
                opacity: 0.3
                extend_to: false
                group_by:
                  func: avg
                  duration: 5min
                yaxis_id: power
          - type: custom:apexcharts-card
            grid_options:
              columns: full
            header:
              show: true
              title: "Heizleistung vs. Stromaufnahme"
            graph_span: 24h
            apex_config:
              chart:
                height: 250
              legend:
                show: true
              tooltip:
                shared: true
                intersect: false
            yaxis:
              - id: thermal
                apex_config:
                  title:
                    text: "kW (therm.)"
              - id: electric
                opposite: true
                apex_config:
                  title:
                    text: "W (elektr.)"
            series:
              - entity: sensor.licv_8_2r1_3_heating_capacity
                name: Heizleistung (therm.)
                color: "#F44336"
                stroke_width: 2
                curve: smooth
                type: area
                opacity: 0.2
                extend_to: false
                yaxis_id: thermal
                group_by:
                  func: avg
                  duration: 5min
              - entity: sensor.kg_technik_waermepumpe_3em_leistung
                name: Stromaufnahme (elektr.)
                color: "#2196F3"
                stroke_width: 2
                curve: smooth
                type: area
                opacity: 0.2
                extend_to: false
                yaxis_id: electric
                group_by:
                  func: avg
                  duration: 5min
              - entity: sensor.luxtronik_341205_065_outdoor_temperature
                name: Außentemperatur
                color: "#4CAF50"
                stroke_width: 1
                stroke_dash: 4
                curve: smooth
                extend_to: false
                yaxis_id: thermal
                group_by:
                  func: avg
                  duration: 5min
          # ── Monatliche Bilanz ──────────────────────────
          - type: heading
            heading: "Monatliche Bilanz"
          - type: custom:mushroom-template-card
            grid_options:
              columns: full
            primary: >-
              Heizung · {{ states('sensor.wp_strom_modus_monatlich_heizen') | float(0) | round(1) }} kWh Strom
            secondary: >-
              {{ states('sensor.wp_heizung_thermisch_monatlich') }} kWh thermisch
              · COP {{ states('sensor.wp_cop_heizung_monatlich') }}
            icon: mdi:radiator
            icon_color: >-
              {% set cop = states('sensor.wp_cop_heizung_monatlich') | float(0) %}
              {% if cop > 3.5 %}green{% elif cop > 2.5 %}amber{% else %}red{% endif %}
            entity: sensor.wp_cop_heizung_monatlich
          - type: custom:mushroom-template-card
            grid_options:
              columns: full
            primary: >-
              Warmwasser · {{ states('sensor.wp_strom_modus_monatlich_warmwasser') | float(0) | round(1) }} kWh Strom
            secondary: >-
              {{ states('sensor.wp_warmwasser_thermisch_monatlich') }} kWh thermisch
              · COP {{ states('sensor.wp_cop_warmwasser_monatlich') }}
            icon: mdi:water-boiler
            icon_color: >-
              {% set cop = states('sensor.wp_cop_warmwasser_monatlich') | float(0) %}
              {% if cop > 3.5 %}green{% elif cop > 2.5 %}amber{% else %}red{% endif %}
            entity: sensor.wp_cop_warmwasser_monatlich
          - type: custom:mushroom-template-card
            grid_options:
              columns: full
            primary: "Kombiniert · {{ states('sensor.wp_strom_monatlich') }} kWh Strom"
            secondary: >-
              {{ (states('sensor.wp_heizung_thermisch_monatlich') | float(0) + states('sensor.wp_warmwasser_thermisch_monatlich') | float(0)) | round(1) }} kWh thermisch
              · COP {{ states('sensor.wp_cop_kombiniert_monatlich') }}
            icon: mdi:heat-pump-outline
            icon_color: >-
              {% set cop = states('sensor.wp_cop_kombiniert_monatlich') | float(0) %}
              {% if cop > 3.5 %}green{% elif cop > 2.5 %}amber{% else %}red{% endif %}
            entity: sensor.wp_cop_kombiniert_monatlich
          # ── Gesamt (seit Tracking) ─────────────────────
          - type: heading
            heading: "Gesamt (seit Tracking)"
          - type: custom:mushroom-template-card
            grid_options:
              columns: full
            primary: >-
              Heizung gesamt · {{ states('sensor.wp_strom_modus_gesamt_heizen') | float(0) | round(1) }} kWh Strom
            secondary: >-
              {{ states('sensor.wp_heizung_thermisch_gesamt_seit_tracking') }} kWh thermisch
              · COP {{ states('sensor.wp_cop_heizung_gesamt') }}
            icon: mdi:radiator
            icon_color: blue
            entity: sensor.wp_cop_heizung_gesamt
          - type: custom:mushroom-template-card
            grid_options:
              columns: full
            primary: >-
              Warmwasser gesamt · {{ states('sensor.wp_strom_modus_gesamt_warmwasser') | float(0) | round(1) }} kWh Strom
            secondary: >-
              {{ states('sensor.wp_warmwasser_thermisch_gesamt_seit_tracking') }} kWh thermisch
              · COP {{ states('sensor.wp_cop_warmwasser_gesamt') }}
            icon: mdi:water-boiler
            icon_color: orange
            entity: sensor.wp_cop_warmwasser_gesamt
          - type: custom:mushroom-template-card
            grid_options:
              columns: full
            primary: "Kombiniert gesamt · {{ states('sensor.wp_strom_gesamt_seit_tracking') }} kWh Strom"
            secondary: >-
              {{ (states('sensor.wp_heizung_thermisch_gesamt_seit_tracking') | float(0) + states('sensor.wp_warmwasser_thermisch_gesamt_seit_tracking') | float(0)) | round(1) }} kWh thermisch
              · COP {{ states('sensor.wp_cop_kombiniert_gesamt') }}
            icon: mdi:heat-pump-outline
            icon_color: blue
            entity: sensor.wp_cop_kombiniert_gesamt
          - type: custom:mushroom-entity-card
            entity: sensor.licv_8_2r1_3_heating_capacity
            name: Heizleistung
            icon: mdi:fire
            icon_color: red
          - type: custom:mushroom-entity-card
            entity: sensor.luxtronik_341205_065_heat_energy_input
            name: Stromaufnahme (myUplink)
            icon: mdi:flash
            icon_color: amber
          - type: custom:mushroom-entity-card
            entity: sensor.luxtronik_341205_065_operation_hours
            name: Betriebsstunden Verdichter
            icon: mdi:clock-outline
            icon_color: blue
          - type: custom:mushroom-entity-card
            entity: sensor.luxtronik_341205_065_operation_hours_heating
            name: Betriebsstunden Heizen
            icon: mdi:clock-outline
            icon_color: grey
          - type: custom:mushroom-entity-card
            entity: sensor.luxtronik_341205_065_dhw_operation_hours
            name: Betriebsstunden WW
            icon: mdi:clock-outline
            icon_color: grey
          - type: custom:mushroom-entity-card
            entity: sensor.kg_technik_waermepumpe_3em_energie
            name: Stromzähler (Shelly 3EM)
            icon: mdi:meter-electric
            icon_color: amber
          - type: custom:mushroom-entity-card
            entity: sensor.luxtronik_341205_065_heat_amount_heating
            name: Wärmemenge gesamt
            icon: mdi:fire-circle
            icon_color: red
          - type: custom:mushroom-entity-card
            entity: sensor.luxtronik_341205_065_heat_amount_heating
            name: Heizung gesamt
            icon: mdi:counter
            icon_color: red
          - type: custom:mushroom-entity-card
            entity: sensor.luxtronik_341205_065_dhw_heat_amount
            name: Warmwasser gesamt
            icon: mdi:counter
            icon_color: orange

      # ── Section: Betriebsmodus-Zeitleiste ─────────────
      - type: grid
        cards:
          - type: heading
            heading: "Betriebsmodus-Verlauf"
          - type: custom:apexcharts-card
            grid_options:
              columns: full
            header:
              show: true
              title: "WP-Modus & Batterie-Steuerung"
            graph_span: 24h
            span:
              start: day
            now:
              show: true
              label: Jetzt
            apex_config:
              chart:
                height: 180
              legend:
                show: true
              tooltip:
                shared: true
                intersect: false
            yaxis:
              - id: modus
                min: -0.5
                max: 7.5
                apex_config:
                  title:
                    text: ""
                  labels:
                    formatter: |
                      EVAL:function(val) {
                        var m = {0:'Heizen',1:'Warmwasser',2:'Kühlen',3:'Abtauen',5:'Standby',6:'EVU-Sperre',7:'Fehler'};
                        return m[Math.round(val)] || '';
                      }
            series:
              - entity: sensor.luxtronik_341205_065_status
                name: "WP Modus"
                color: "#2196F3"
                stroke_width: 3
                curve: stepline
                yaxis_id: modus
                extend_to: false
                group_by:
                  func: last
                  duration: 5min
          - type: history-graph
            grid_options:
              columns: full
            title: "Heartbeat & WP (Zustandsverlauf)"
            hours_to_show: 24
            entities:
              - entity: sensor.heartbeat_modus
                name: Heartbeat
              - entity: sensor.emhass_modus
                name: EMHASS
              - entity: sensor.wp_betriebsmodus
                name: WP Modus
