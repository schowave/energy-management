views:
  - type: sections
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Strompreis
          - graph: line
            type: sensor
            detail: 1
            entity: sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45
            name: Strompreis
            icon: mdi:currency-eur
          - type: entity
            entity: sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45
            attribute: price_today_min
            name: Tagesminimum
            icon: mdi:arrow-down-bold
            unit: EUR/kWh
          - type: entity
            entity: sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45
            attribute: price_today_max
            name: Tagesmaximum
            icon: mdi:arrow-up-bold
            unit: EUR/kWh
          - type: entity
            entity: sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45
            attribute: price_today_avg
            name: Tagesdurchschnitt
            icon: mdi:approximately-equal
            unit: EUR/kWh
      - type: grid
        cards:
          - type: heading
            heading: Solar
          - type: gauge
            entity: sensor.total_dc_power
            name: PV-Leistung
            unit: W
            min: 0
            max: 10000
            severity:
              green: 3000
              yellow: 1000
              red: 0
          - graph: line
            type: sensor
            detail: 1
            entity: sensor.total_dc_power
            name: PV-Verlauf
          - type: entity
            entity: sensor.daily_pv_generation
            name: PV heute
            icon: mdi:solar-power
      - type: grid
        cards:
          - type: heading
            heading: Batterie
          - type: gauge
            entity: sensor.battery_level
            name: Ladestand
            unit: "%"
            min: 0
            max: 100
            severity:
              green: 50
              yellow: 20
              red: 0
          - graph: line
            type: sensor
            detail: 1
            entity: sensor.battery_charging_power
            name: Ladeleistung
          - graph: line
            type: sensor
            detail: 1
            entity: sensor.battery_discharging_power
            name: Entladeleistung
          - type: entity
            entity: sensor.daily_battery_charge
            name: Geladen heute
            icon: mdi:battery-plus
          - type: entity
            entity: sensor.daily_battery_discharge
            name: Entladen heute
            icon: mdi:battery-minus
      - type: grid
        cards:
          - type: heading
            heading: Netz
          - graph: line
            type: sensor
            detail: 1
            entity: sensor.import_power
            name: Netzbezug
          - graph: line
            type: sensor
            detail: 1
            entity: sensor.export_power
            name: Einspeisung
          - type: entity
            entity: sensor.daily_imported_energy
            name: Import heute
            icon: mdi:transmission-tower-import
          - type: entity
            entity: sensor.daily_exported_energy
            name: Export heute
            icon: mdi:transmission-tower-export
      - type: grid
        cards:
          - type: heading
            heading: Verbrauch
          - type: gauge
            entity: sensor.load_power
            name: Hausverbrauch
            unit: W
            min: 0
            max: 5000
            severity:
              green: 0
              yellow: 2000
              red: 3500
          - graph: line
            type: sensor
            detail: 1
            entity: sensor.load_power
            name: Verbrauch-Verlauf
