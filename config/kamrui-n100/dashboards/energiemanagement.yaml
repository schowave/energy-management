views:
  - type: sections
    sections:
      # ── Energiefluss ──────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Energiefluss
          - type: custom:power-flow-card-plus
            entities:
              solar:
                entity: sensor.total_dc_power
                display_zero_state: true
              battery:
                entity: sensor.energy_battery_battery_discharging_power_battery_charging_power_net_power
                state_of_charge: sensor.battery_level
                display_zero_state: true
              grid:
                entity: sensor.energy_grid_import_power_export_power_net_power
                display_zero_state: true
              home:
                entity: sensor.load_power
                display_zero_state: true
            clickable_entities: true
            display_zero_lines:
              mode: show
            use_new_flow_rate_model: true
            w_decimals: 0
            kw_decimals: 1
            min_flow_rate: 0.75
            max_flow_rate: 6
            watt_threshold: 0
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:home-lightning-bolt
                icon_color: green
                content: "Autarkie {{ states('sensor.autarkiegrad') }}%"
                entity: sensor.autarkiegrad
              - type: template
                icon: mdi:solar-power-variant
                icon_color: orange
                content: "Eigen {{ states('sensor.eigenverbrauchsquote') }}%"
                entity: sensor.eigenverbrauchsquote
              - type: template
                icon: mdi:battery
                icon_color: >-
                  {% set soc = states('sensor.battery_level') | float(0) %}
                  {% if soc > 50 %}green{% elif soc > 20 %}amber{% else %}red{% endif %}
                content: "SOC {{ states('sensor.battery_level') }}%"
                entity: sensor.battery_level
              - type: template
                icon: mdi:currency-eur
                icon_color: blue
                content: "{{ states('sensor.current_electricity_market_price') | float(0) | round(2) }} €/kWh"
                entity: sensor.current_electricity_market_price

      # ── Strompreis ────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Strompreis
          - type: custom:apexcharts-card
            header:
              show: true
              title: "Preisverlauf: 1komma5° vs. ENTSO-e Börse"
            graph_span: 24h
            span:
              start: day
            apex_config:
              chart:
                height: 280
              tooltip:
                shared: true
              legend:
                show: true
            yaxis:
              - id: price
                min: 0
                apex_config:
                  title:
                    text: EUR/kWh
                  labels:
                    formatter: |
                      EVAL:function(val) { return val ? val.toFixed(2) : '0'; }
            series:
              - entity: sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45
                name: "1komma5° Real"
                color: "#4CAF50"
                stroke_width: 2
                float_precision: 2
                extend_to: false
                yaxis_id: price
                group_by:
                  func: avg
                  duration: 5min
              - entity: sensor.1komma5_tagesforecast
                name: "1komma5° Forecast"
                color: "#4CAF50"
                stroke_width: 1
                curve: stepline
                float_precision: 2
                opacity: 0.5
                yaxis_id: price
                data_generator: |
                  const mp = parseFloat(entity.attributes.midnight_price) || 0;
                  const raw = entity.attributes.forecast_json || [];
                  const fc = typeof raw === 'string' ? JSON.parse(raw) : raw;
                  const today = new Date();
                  today.setHours(0, 0, 0, 0);
                  const points = [[today.getTime(), mp]];
                  fc.forEach(f => points.push([
                    new Date(f.datetime).getTime(),
                    f.price
                  ]));
                  return points;
              - entity: sensor.current_electricity_market_price
                name: "ENTSO-e Börse"
                color: "#FF9800"
                stroke_width: 2
                curve: stepline
                float_precision: 2
                extend_to: false
                yaxis_id: price
                group_by:
                  func: avg
                  duration: 60min
              - entity: sensor.average_electricity_price
                name: "ENTSO-e Forecast"
                color: "#FF9800"
                stroke_width: 1
                curve: stepline
                float_precision: 2
                opacity: 0.5
                yaxis_id: price
                data_generator: |
                  const today = entity.attributes.prices_today || [];
                  const tomorrow = entity.attributes.prices_tomorrow || [];
                  const all = [...today, ...tomorrow];
                  return all.map(f => [
                    new Date(f.time).getTime(),
                    f.price
                  ]);
          - type: custom:mushroom-entity-card
            entity: sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45
            name: "1komma5° aktuell"
            icon: mdi:lightning-bolt
            icon_color: green
          - type: custom:mushroom-entity-card
            entity: sensor.current_electricity_market_price
            name: "ENTSO-e aktuell"
            icon: mdi:currency-eur
            icon_color: orange
          - type: custom:mushroom-entity-card
            entity: sensor.lowest_energy_price
            name: "ENTSO-e Minimum"
            icon: mdi:arrow-down-bold
            icon_color: green
          - type: custom:mushroom-entity-card
            entity: sensor.highest_energy_price
            name: "ENTSO-e Maximum"
            icon: mdi:arrow-up-bold
            icon_color: red
          - type: markdown
            content: |
              {% set hour = state_attr('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45', 'cheapest_upcoming_hour') %}
              {% set price = state_attr('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45', 'cheapest_upcoming_price') %}
              {% if hour and price %}
              🕐 Günstigste (1k5): **{{ as_timestamp(hour) | timestamp_custom('%H:%M') }} Uhr** — {{ price }} EUR/kWh
              {% else %}
              🕐 Keine günstigere Stunde mehr heute
              {% endif %}
              {% set diff = states('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45') | float(0) - states('sensor.current_electricity_market_price') | float(0) %}
              💰 Aufschlag 1komma5° vs. Börse: **{{ (diff * 100) | round(1) }} ct/kWh**

      # ── PV-Erzeugung ─────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: PV-Erzeugung
          - type: custom:apexcharts-card
            header:
              show: true
              title: PV Real vs. Solcast Forecast
            graph_span: 24h
            span:
              start: day
            apex_config:
              chart:
                height: 300
              legend:
                show: true
              tooltip:
                shared: true
            yaxis:
              - id: power
                min: 0
                apex_config:
                  title:
                    text: Watt
            series:
              - entity: sensor.total_dc_power
                name: PV Real
                color: "#FF6B35"
                stroke_width: 2
                curve: smooth
                extend_to: false
                group_by:
                  func: avg
                  duration: 5min
                yaxis_id: power
              - entity: sensor.solcast_pv_forecast_prognose_heute
                name: Forecast
                color: "#2196F3"
                stroke_width: 2
                curve: smooth
                yaxis_id: power
                data_generator: |
                  return entity.attributes.detailedForecast.map(f => [
                    new Date(f.period_start).getTime(),
                    f.pv_estimate * 1000
                  ]);
              - entity: sensor.solcast_pv_forecast_prognose_heute
                name: Optimistisch (90)
                color: "#2196F3"
                stroke_width: 0
                type: area
                opacity: 0.15
                curve: smooth
                yaxis_id: power
                data_generator: |
                  return entity.attributes.detailedForecast.map(f => [
                    new Date(f.period_start).getTime(),
                    f.pv_estimate90 * 1000
                  ]);
              - entity: sensor.solcast_pv_forecast_prognose_heute
                name: Pessimistisch (10)
                color: "#2196F3"
                stroke_width: 0
                type: area
                opacity: 0.15
                curve: smooth
                yaxis_id: power
                data_generator: |
                  return entity.attributes.detailedForecast.map(f => [
                    new Date(f.period_start).getTime(),
                    f.pv_estimate10 * 1000
                  ]);
          - type: custom:mushroom-entity-card
            entity: sensor.daily_pv_generation
            name: PV heute (real)
            icon: mdi:solar-power
            icon_color: orange
          - type: custom:mushroom-entity-card
            entity: sensor.solcast_pv_forecast_prognose_heute
            name: PV heute (Prognose)
            icon: mdi:chart-line
            icon_color: blue
          - type: custom:mushroom-entity-card
            entity: sensor.solcast_pv_forecast_prognose_verbleibende_leistung_heute
            name: PV verbleibend
            icon: mdi:sun-clock
            icon_color: amber

      # ── Batterie ──────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Batterie
          - type: custom:mushroom-template-card
            primary: "Ladestand: {{ states('sensor.battery_level') }}%"
            secondary: >-
              {% if is_state('binary_sensor.battery_charging', 'on') %}
                Laden {{ states('sensor.battery_charging_power') }} W
              {% elif is_state('binary_sensor.battery_discharging', 'on') %}
                Entladen {{ states('sensor.battery_discharging_power') }} W
              {% else %}
                Idle
              {% endif %}
            icon: >-
              {% set soc = states('sensor.battery_level') | float(0) %}
              {% if soc > 80 %}mdi:battery-high
              {% elif soc > 40 %}mdi:battery-medium
              {% else %}mdi:battery-low{% endif %}
            icon_color: >-
              {% set soc = states('sensor.battery_level') | float(0) %}
              {% if soc > 50 %}green{% elif soc > 20 %}amber{% else %}red{% endif %}
            entity: sensor.battery_level
            badge_icon: >-
              {% if is_state('binary_sensor.battery_charging', 'on') %}mdi:arrow-up-bold
              {% elif is_state('binary_sensor.battery_discharging', 'on') %}mdi:arrow-down-bold
              {% else %}mdi:pause{% endif %}
            badge_color: >-
              {% if is_state('binary_sensor.battery_charging', 'on') %}green
              {% elif is_state('binary_sensor.battery_discharging', 'on') %}red
              {% else %}grey{% endif %}
          - type: custom:apexcharts-card
            header:
              show: true
              title: Batterie Lade-/Entladeleistung
            graph_span: 24h
            span:
              start: day
            apex_config:
              chart:
                height: 250
              legend:
                show: true
              tooltip:
                shared: true
            series:
              - entity: sensor.battery_charging_power
                name: Laden
                color: "#4CAF50"
                type: column
                group_by:
                  func: avg
                  duration: 15min
              - entity: sensor.battery_discharging_power
                name: Entladen
                color: "#F44336"
                type: column
                invert: true
                group_by:
                  func: avg
                  duration: 15min
          - type: custom:mushroom-entity-card
            entity: sensor.daily_battery_charge
            name: Geladen heute
            icon: mdi:battery-plus
            icon_color: green
          - type: custom:mushroom-entity-card
            entity: sensor.daily_battery_discharge
            name: Entladen heute
            icon: mdi:battery-minus
            icon_color: red

      # ── Netz ──────────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Netz
          - type: custom:apexcharts-card
            header:
              show: true
              title: Netzbezug / Einspeisung
            graph_span: 24h
            span:
              start: day
            apex_config:
              chart:
                height: 250
              legend:
                show: true
              tooltip:
                shared: true
            series:
              - entity: sensor.import_power
                name: Bezug
                color: "#F44336"
                type: column
                group_by:
                  func: avg
                  duration: 15min
              - entity: sensor.export_power
                name: Einspeisung
                color: "#4CAF50"
                type: column
                invert: true
                group_by:
                  func: avg
                  duration: 15min
          - type: custom:mushroom-entity-card
            entity: sensor.daily_imported_energy
            name: Import heute
            icon: mdi:transmission-tower-import
            icon_color: red
          - type: custom:mushroom-entity-card
            entity: sensor.daily_exported_energy
            name: Export heute
            icon: mdi:transmission-tower-export
            icon_color: green

      # ── Wärmepumpe ─────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: "Wärmepumpe"
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.kg_technik_waermepumpe_3em_leistung') | float(0) | round(0) }} W"
            secondary: "Novelan LICV 8.2"
            icon: mdi:heat-pump-outline
            icon_color: >-
              {% set p = states('sensor.kg_technik_waermepumpe_3em_leistung') | float(0) %}
              {% if p < 100 %}grey{% elif p < 2000 %}blue{% else %}red{% endif %}
            entity: sensor.kg_technik_waermepumpe_3em_leistung
          - type: custom:apexcharts-card
            header:
              show: true
              title: WP-Leistung (3-Phasen)
            graph_span: 24h
            span:
              start: day
            apex_config:
              chart:
                height: 250
              legend:
                show: true
              tooltip:
                shared: true
            yaxis:
              - id: power
                min: 0
                apex_config:
                  title:
                    text: Watt
            series:
              - entity: sensor.kg_technik_waermepumpe_3em_leistung
                name: Gesamt
                color: "#2196F3"
                stroke_width: 2
                curve: smooth
                extend_to: false
                group_by:
                  func: avg
                  duration: 5min
                yaxis_id: power
              - entity: sensor.kg_technik_waermepumpe_3em_phase_a_leistung
                name: Phase A
                color: "#F44336"
                stroke_width: 1
                curve: smooth
                opacity: 0.5
                extend_to: false
                group_by:
                  func: avg
                  duration: 5min
                yaxis_id: power
              - entity: sensor.kg_technik_waermepumpe_3em_phase_b_leistung
                name: Phase B
                color: "#4CAF50"
                stroke_width: 1
                curve: smooth
                opacity: 0.5
                extend_to: false
                group_by:
                  func: avg
                  duration: 5min
                yaxis_id: power
              - entity: sensor.kg_technik_waermepumpe_3em_phase_c_leistung
                name: Phase C
                color: "#FF9800"
                stroke_width: 1
                curve: smooth
                opacity: 0.5
                extend_to: false
                group_by:
                  func: avg
                  duration: 5min
                yaxis_id: power
          - type: custom:mushroom-entity-card
            entity: sensor.kg_technik_waermepumpe_3em_energie
            name: Energie gesamt
            icon: mdi:counter
            icon_color: blue
          - type: custom:mushroom-entity-card
            entity: sensor.kg_technik_waermepumpe_3em_temperatur
            name: Gerätetemperatur
            icon: mdi:thermometer
            icon_color: amber

      # ── Verbrauch & Autarkie ──────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Verbrauch & Autarkie
          - type: custom:mushroom-template-card
            primary: "Autarkie: {{ states('sensor.autarkiegrad') }}%"
            secondary: "Eigenverbrauch: {{ states('sensor.eigenverbrauchsquote') }}%"
            icon: mdi:home-lightning-bolt
            icon_color: >-
              {% set a = states('sensor.autarkiegrad') | float(0) %}
              {% if a > 70 %}green{% elif a > 40 %}amber{% else %}red{% endif %}
            entity: sensor.autarkiegrad
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.load_power') }} W"
            secondary: "Hausverbrauch"
            icon: mdi:home
            icon_color: >-
              {% set p = states('sensor.load_power') | float(0) %}
              {% if p < 2000 %}green{% elif p < 3500 %}amber{% else %}red{% endif %}
            entity: sensor.load_power
          - type: custom:apexcharts-card
            header:
              show: true
              title: Verbrauch-Verlauf
            graph_span: 24h
            span:
              start: day
            apex_config:
              chart:
                height: 250
            yaxis:
              - id: power
                min: 0
                apex_config:
                  title:
                    text: Watt
            series:
              - entity: sensor.load_power
                name: Hausverbrauch
                color: "#FF9800"
                stroke_width: 2
                curve: smooth
                type: area
                opacity: 0.3
                extend_to: false
                group_by:
                  func: avg
                  duration: 5min
                yaxis_id: power

      # ── Solcast Forecast ──────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Solcast Forecast
          - type: custom:mushroom-entity-card
            entity: sensor.solcast_pv_forecast_prognose_morgen
            name: Prognose morgen
            icon: mdi:weather-sunny
            icon_color: amber
          - type: custom:mushroom-entity-card
            entity: sensor.solcast_pv_forecast_prognose_spitzenleistung_heute
            name: Peak heute
            icon: mdi:arrow-up-bold
            icon_color: orange
          - type: custom:mushroom-entity-card
            entity: sensor.solcast_pv_forecast_prognose_spitzenleistung_morgen
            name: Peak morgen
            icon: mdi:arrow-up-bold-outline
            icon_color: orange
          - type: custom:mushroom-entity-card
            entity: sensor.solcast_pv_forecast_prognose_aktuelle_stunde
            name: Aktuelle Stunde
            icon: mdi:clock-outline
            icon_color: blue
          - type: custom:mushroom-entity-card
            entity: sensor.solcast_pv_forecast_prognose_nachste_stunde
            name: "Nächste Stunde"
            icon: mdi:clock-fast
            icon_color: blue
          - type: custom:mushroom-entity-card
            entity: sensor.solcast_pv_forecast_leistung_in_30_minuten
            name: In 30 Min
            icon: mdi:timer-sand
            icon_color: teal
          - type: custom:mushroom-entity-card
            entity: sensor.solcast_pv_forecast_leistung_in_1_stunde
            name: In 1 Stunde
            icon: mdi:timer-outline
            icon_color: teal
