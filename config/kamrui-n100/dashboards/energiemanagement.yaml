views:
  - type: sections
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Strompreis
          - graph: line
            type: sensor
            detail: 1
            entity: sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45
            name: Strompreis
            icon: mdi:currency-eur
          - type: markdown
            content: |
              ↓ {{ state_attr('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45', 'price_today_min') }} · ↑ {{ state_attr('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45', 'price_today_max') }} · ⌀ {{ state_attr('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45', 'price_today_avg') }} EUR/kWh

              🕐 Günstigste: **{{ as_timestamp(state_attr('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45', 'cheapest_upcoming_hour')) | timestamp_custom('%H:%M') }} Uhr** ({{ state_attr('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45', 'cheapest_upcoming_price') }} EUR/kWh)

              | Uhrzeit | Preis |
              |:--------|------:|
              {% for item in state_attr('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45', 'forecast') -%}
              | {{ as_timestamp(item.datetime) | timestamp_custom('%H:%M') }} | {{ '%.2f' | format(item.price) }} ct |
              {% endfor %}
            title: Forecast
      - type: grid
        cards:
          - type: heading
            heading: Solar & Verbrauch
          - type: gauge
            entity: sensor.total_dc_power
            name: PV-Leistung
            unit: W
            min: 0
            max: 10000
            severity:
              green: 3000
              yellow: 1000
              red: 0
          - type: gauge
            entity: sensor.load_power
            name: Hausverbrauch
            unit: W
            min: 0
            max: 5000
            severity:
              green: 0
              yellow: 2000
              red: 3500
          - type: entity
            entity: sensor.daily_pv_generation
            name: PV heute
            icon: mdi:solar-power
          - graph: line
            type: sensor
            detail: 1
            entity: sensor.load_power
            name: Verbrauch-Verlauf
      - type: grid
        cards:
          - type: heading
            heading: Batterie
          - type: gauge
            entity: sensor.battery_level
            name: Ladestand
            unit: "%"
            min: 0
            max: 100
            severity:
              green: 50
              yellow: 20
              red: 0
          - graph: line
            type: sensor
            detail: 1
            entity: sensor.battery_charging_power
            name: Ladeleistung
          - type: entity
            entity: sensor.daily_battery_charge
            name: Geladen heute
            icon: mdi:battery-plus
          - type: entity
            entity: sensor.daily_battery_discharge
            name: Entladen heute
            icon: mdi:battery-minus
      - type: grid
        cards:
          - type: heading
            heading: Netz
          - graph: line
            type: sensor
            detail: 1
            entity: sensor.import_power
            name: Netzbezug
          - graph: line
            type: sensor
            detail: 1
            entity: sensor.export_power
            name: Einspeisung
          - type: entity
            entity: sensor.daily_imported_energy
            name: Import heute
            icon: mdi:transmission-tower-import
          - type: entity
            entity: sensor.daily_exported_energy
            name: Export heute
            icon: mdi:transmission-tower-export
