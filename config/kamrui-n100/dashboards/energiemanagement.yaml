views:
  # ════════════════════════════════════════════════════
  # Tab 1: Übersicht — Was passiert gerade?
  # ════════════════════════════════════════════════════
  - type: sections
    title: "Übersicht"
    icon: mdi:home-lightning-bolt
    sections:
      # ── Energiefluss ──────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Energiefluss
          - type: custom:power-flow-card-plus
            entities:
              solar:
                entity: sensor.total_dc_power
                display_zero_state: true
              battery:
                entity: sensor.energy_battery_battery_discharging_power_battery_charging_power_net_power
                state_of_charge: sensor.battery_level
                display_zero_state: true
              grid:
                entity: sensor.energy_grid_import_power_export_power_net_power
                display_zero_state: true
              home:
                entity: sensor.load_power
                display_zero_state: true
            clickable_entities: true
            display_zero_lines:
              mode: show
            use_new_flow_rate_model: true
            w_decimals: 0
            kw_decimals: 1
            min_flow_rate: 0.75
            max_flow_rate: 6
            watt_threshold: 0
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:home-lightning-bolt
                icon_color: green
                content: "Autarkie {{ states('sensor.autarkiegrad') }}%"
                entity: sensor.autarkiegrad
              - type: template
                icon: mdi:solar-power-variant
                icon_color: orange
                content: "Eigen {{ states('sensor.eigenverbrauchsquote') }}%"
                entity: sensor.eigenverbrauchsquote
              - type: template
                icon: mdi:battery
                icon_color: >-
                  {% set soc = states('sensor.battery_level') | float(0) %}
                  {% if soc > 50 %}green{% elif soc > 20 %}amber{% else %}red{% endif %}
                content: "SOC {{ states('sensor.battery_level') }}%"
                entity: sensor.battery_level
              - type: template
                icon: mdi:currency-eur
                icon_color: blue
                content: "{{ states('sensor.current_electricity_market_price') | float(0) | round(2) }} €/kWh"
                entity: sensor.current_electricity_market_price

      # ── Strompreis ────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Strompreis
          - type: custom:apexcharts-card
            header:
              show: true
              title: "Preisverlauf: 1komma5° vs. ENTSO-e Börse"
            graph_span: 24h
            span:
              start: day
            apex_config:
              chart:
                height: 280
              tooltip:
                shared: true
                intersect: false
              legend:
                show: true
            yaxis:
              - id: price
                min: 0
                apex_config:
                  title:
                    text: EUR/kWh
                  labels:
                    formatter: |
                      EVAL:function(val) { return val ? val.toFixed(2) : '0'; }
            series:
              - entity: sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45
                name: "1komma5° Real"
                color: "#4CAF50"
                stroke_width: 2
                float_precision: 2
                extend_to: false
                yaxis_id: price
                group_by:
                  func: avg
                  duration: 5min
              - entity: sensor.1komma5_tagesforecast
                name: "1komma5° Forecast"
                color: "#4CAF50"
                stroke_width: 1
                curve: stepline
                float_precision: 2
                opacity: 0.5
                yaxis_id: price
                data_generator: |
                  const mp = parseFloat(entity.attributes.midnight_price) || 0;
                  const raw = entity.attributes.forecast_json || [];
                  const fc = typeof raw === 'string' ? JSON.parse(raw) : raw;
                  const today = new Date();
                  today.setHours(0, 0, 0, 0);
                  const points = [[today.getTime(), mp]];
                  fc.forEach(f => points.push([
                    new Date(f.datetime).getTime(),
                    f.price
                  ]));
                  return points;
              - entity: sensor.current_electricity_market_price
                name: "ENTSO-e Börse"
                color: "#FF9800"
                stroke_width: 2
                curve: stepline
                float_precision: 2
                extend_to: false
                yaxis_id: price
                group_by:
                  func: avg
                  duration: 60min
              - entity: sensor.average_electricity_price
                name: "ENTSO-e Forecast"
                color: "#FF9800"
                stroke_width: 1
                curve: stepline
                float_precision: 2
                opacity: 0.5
                yaxis_id: price
                data_generator: |
                  const today = entity.attributes.prices_today || [];
                  const tomorrow = entity.attributes.prices_tomorrow || [];
                  const all = [...today, ...tomorrow];
                  return all.map(f => [
                    new Date(f.time).getTime(),
                    f.price
                  ]);
          - type: custom:mushroom-entity-card
            entity: sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45
            name: "1komma5° aktuell"
            icon: mdi:lightning-bolt
            icon_color: green
          - type: custom:mushroom-entity-card
            entity: sensor.current_electricity_market_price
            name: "ENTSO-e aktuell"
            icon: mdi:currency-eur
            icon_color: orange
          - type: custom:mushroom-entity-card
            entity: sensor.lowest_energy_price
            name: "ENTSO-e Minimum"
            icon: mdi:arrow-down-bold
            icon_color: green
          - type: custom:mushroom-entity-card
            entity: sensor.highest_energy_price
            name: "ENTSO-e Maximum"
            icon: mdi:arrow-up-bold
            icon_color: red
          - type: markdown
            content: |
              {% set hour = state_attr('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45', 'cheapest_upcoming_hour') %}
              {% set price = state_attr('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45', 'cheapest_upcoming_price') %}
              {% if hour and price %}
              🕐 Günstigste (1k5): **{{ as_timestamp(hour) | timestamp_custom('%H:%M') }} Uhr** — {{ price }} EUR/kWh
              {% else %}
              🕐 Keine günstigere Stunde mehr heute
              {% endif %}
              {% set diff = states('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45') | float(0) - states('sensor.current_electricity_market_price') | float(0) %}
              💰 Aufschlag 1komma5° vs. Börse: **{{ (diff * 100) | round(1) }} ct/kWh**

      # ── PV-Erzeugung ─────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: PV-Erzeugung
          - type: custom:apexcharts-card
            header:
              show: true
              title: PV Real vs. Solcast Forecast
            graph_span: 24h
            span:
              start: day
            apex_config:
              chart:
                height: 300
              legend:
                show: true
              tooltip:
                shared: true
                intersect: false
            yaxis:
              - id: power
                min: 0
                apex_config:
                  title:
                    text: Watt
            series:
              - entity: sensor.total_dc_power
                name: PV Real
                color: "#FF6B35"
                stroke_width: 2
                curve: smooth
                extend_to: false
                group_by:
                  func: avg
                  duration: 5min
                yaxis_id: power
              - entity: sensor.solcast_pv_forecast_prognose_heute
                name: Forecast
                color: "#2196F3"
                stroke_width: 2
                curve: smooth
                yaxis_id: power
                data_generator: |
                  return entity.attributes.detailedForecast.map(f => [
                    new Date(f.period_start).getTime(),
                    f.pv_estimate * 1000
                  ]);
              - entity: sensor.solcast_pv_forecast_prognose_heute
                name: Optimistisch (90)
                color: "#2196F3"
                stroke_width: 0
                type: area
                opacity: 0.15
                curve: smooth
                yaxis_id: power
                data_generator: |
                  return entity.attributes.detailedForecast.map(f => [
                    new Date(f.period_start).getTime(),
                    f.pv_estimate90 * 1000
                  ]);
              - entity: sensor.solcast_pv_forecast_prognose_heute
                name: Pessimistisch (10)
                color: "#2196F3"
                stroke_width: 0
                type: area
                opacity: 0.15
                curve: smooth
                yaxis_id: power
                data_generator: |
                  return entity.attributes.detailedForecast.map(f => [
                    new Date(f.period_start).getTime(),
                    f.pv_estimate10 * 1000
                  ]);
          - type: custom:mushroom-entity-card
            entity: sensor.daily_pv_generation
            name: PV heute (real)
            icon: mdi:solar-power
            icon_color: orange
          - type: custom:mushroom-entity-card
            entity: sensor.solcast_pv_forecast_prognose_heute
            name: PV heute (Prognose)
            icon: mdi:chart-line
            icon_color: blue
          - type: custom:mushroom-entity-card
            entity: sensor.solcast_pv_forecast_prognose_verbleibende_leistung_heute
            name: PV verbleibend
            icon: mdi:sun-clock
            icon_color: amber

      # ── Batterie ──────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Batterie
          - type: custom:mushroom-template-card
            primary: "Ladestand: {{ states('sensor.battery_level') }}%"
            secondary: >-
              {% if is_state('binary_sensor.battery_charging', 'on') %}
                Laden {{ states('sensor.battery_charging_power') }} W
              {% elif is_state('binary_sensor.battery_discharging', 'on') %}
                Entladen {{ states('sensor.battery_discharging_power') }} W
              {% else %}
                Idle
              {% endif %}
            icon: >-
              {% set soc = states('sensor.battery_level') | float(0) %}
              {% if soc > 80 %}mdi:battery-high
              {% elif soc > 40 %}mdi:battery-medium
              {% else %}mdi:battery-low{% endif %}
            icon_color: >-
              {% set soc = states('sensor.battery_level') | float(0) %}
              {% if soc > 50 %}green{% elif soc > 20 %}amber{% else %}red{% endif %}
            entity: sensor.battery_level
            badge_icon: >-
              {% if is_state('binary_sensor.battery_charging', 'on') %}mdi:arrow-up-bold
              {% elif is_state('binary_sensor.battery_discharging', 'on') %}mdi:arrow-down-bold
              {% else %}mdi:pause{% endif %}
            badge_color: >-
              {% if is_state('binary_sensor.battery_charging', 'on') %}green
              {% elif is_state('binary_sensor.battery_discharging', 'on') %}red
              {% else %}grey{% endif %}
          - type: custom:apexcharts-card
            header:
              show: true
              title: Batterie Lade-/Entladeleistung
            graph_span: 24h
            span:
              start: day
            apex_config:
              chart:
                height: 250
              legend:
                show: true
              tooltip:
                shared: true
                intersect: false
            series:
              - entity: sensor.battery_charging_power
                name: Laden
                color: "#4CAF50"
                type: column
                group_by:
                  func: avg
                  duration: 15min
              - entity: sensor.battery_discharging_power
                name: Entladen
                color: "#F44336"
                type: column
                invert: true
                group_by:
                  func: avg
                  duration: 15min
          - type: custom:mushroom-entity-card
            entity: sensor.daily_battery_charge
            name: Geladen heute
            icon: mdi:battery-plus
            icon_color: green
          - type: custom:mushroom-entity-card
            entity: sensor.daily_battery_discharge
            name: Entladen heute
            icon: mdi:battery-minus
            icon_color: red

      # ── Netz ──────────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Netz
          - type: custom:apexcharts-card
            header:
              show: true
              title: Netzbezug / Einspeisung
            graph_span: 24h
            span:
              start: day
            apex_config:
              chart:
                height: 250
              legend:
                show: true
              tooltip:
                shared: true
                intersect: false
            series:
              - entity: sensor.import_power
                name: Bezug
                color: "#F44336"
                type: column
                group_by:
                  func: avg
                  duration: 15min
              - entity: sensor.export_power
                name: Einspeisung
                color: "#4CAF50"
                type: column
                invert: true
                group_by:
                  func: avg
                  duration: 15min
          - type: custom:mushroom-entity-card
            entity: sensor.daily_imported_energy
            name: Import heute
            icon: mdi:transmission-tower-import
            icon_color: red
          - type: custom:mushroom-entity-card
            entity: sensor.daily_exported_energy
            name: Export heute
            icon: mdi:transmission-tower-export
            icon_color: green

      # ── Verbrauch & Autarkie ──────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Verbrauch & Autarkie
          - type: custom:mushroom-template-card
            primary: "Autarkie: {{ states('sensor.autarkiegrad') }}%"
            secondary: "Eigenverbrauch: {{ states('sensor.eigenverbrauchsquote') }}%"
            icon: mdi:home-lightning-bolt
            icon_color: >-
              {% set a = states('sensor.autarkiegrad') | float(0) %}
              {% if a > 70 %}green{% elif a > 40 %}amber{% else %}red{% endif %}
            entity: sensor.autarkiegrad
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.load_power') }} W"
            secondary: "Hausverbrauch"
            icon: mdi:home
            icon_color: >-
              {% set p = states('sensor.load_power') | float(0) %}
              {% if p < 2000 %}green{% elif p < 3500 %}amber{% else %}red{% endif %}
            entity: sensor.load_power
          - type: custom:apexcharts-card
            header:
              show: true
              title: Verbrauch-Verlauf
            graph_span: 24h
            span:
              start: day
            apex_config:
              chart:
                height: 250
              tooltip:
                shared: true
                intersect: false
            yaxis:
              - id: power
                min: 0
                apex_config:
                  title:
                    text: Watt
            series:
              - entity: sensor.load_power
                name: Hausverbrauch
                color: "#FF9800"
                stroke_width: 2
                curve: smooth
                type: area
                opacity: 0.3
                extend_to: false
                group_by:
                  func: avg
                  duration: 5min
                yaxis_id: power

      # ── Solcast Forecast ──────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: Solcast Forecast
          - type: custom:mushroom-entity-card
            entity: sensor.solcast_pv_forecast_prognose_morgen
            name: Prognose morgen
            icon: mdi:weather-sunny
            icon_color: amber
          - type: custom:mushroom-entity-card
            entity: sensor.solcast_pv_forecast_prognose_spitzenleistung_heute
            name: Peak heute
            icon: mdi:arrow-up-bold
            icon_color: orange
          - type: custom:mushroom-entity-card
            entity: sensor.solcast_pv_forecast_prognose_spitzenleistung_morgen
            name: Peak morgen
            icon: mdi:arrow-up-bold-outline
            icon_color: orange
          - type: custom:mushroom-entity-card
            entity: sensor.solcast_pv_forecast_prognose_aktuelle_stunde
            name: Aktuelle Stunde
            icon: mdi:clock-outline
            icon_color: blue
          - type: custom:mushroom-entity-card
            entity: sensor.solcast_pv_forecast_prognose_nachste_stunde
            name: "Nächste Stunde"
            icon: mdi:clock-fast
            icon_color: blue
          - type: custom:mushroom-entity-card
            entity: sensor.solcast_pv_forecast_leistung_in_30_minuten
            name: In 30 Min
            icon: mdi:timer-sand
            icon_color: teal
          - type: custom:mushroom-entity-card
            entity: sensor.solcast_pv_forecast_leistung_in_1_stunde
            name: In 1 Stunde
            icon: mdi:timer-outline
            icon_color: teal

  # ════════════════════════════════════════════════════
  # Tab 2: Optimierung & Steuerung — Was soll passieren?
  # ════════════════════════════════════════════════════
  - type: sections
    title: "Optimierung & Steuerung"
    icon: mdi:robot
    sections:
      # ── EMHASS Optimierung ─────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: "EMHASS Optimierung"
          # Status-Karten
          - type: custom:mushroom-template-card
            primary: >-
              {% if states('sensor.optim_status') not in ['unknown', 'unavailable', ''] %}
                Status: {{ states('sensor.optim_status') }}
              {% else %}
                Status: Keine Daten
              {% endif %}
            secondary: >-
              {% set last = state_attr('automation.emhass_day_ahead_optimierung', 'last_triggered') %}
              {% if last %}
                Letzte Berechnung: {{ as_timestamp(last) | timestamp_custom('%d.%m. %H:%M') }}
              {% else %}
                Täglich 05:30, 13:30, 18:00
              {% endif %}
            icon: mdi:robot
            icon_color: >-
              {% if states('sensor.optim_status') == 'Optimal' %}green
              {% elif states('sensor.optim_status') in ['unknown', 'unavailable', ''] %}grey
              {% else %}red{% endif %}
            entity: automation.emhass_day_ahead_optimierung
          - type: custom:mushroom-template-card
            primary: >-
              {% if states('sensor.p_batt_forecast') not in ['unknown', 'unavailable'] %}
                {% set p = states('sensor.p_batt_forecast') | float(0) %}
                Batterie-Empfehlung: {% if p > 50 %}Laden {{ p | round(0) }} W
                {% elif p < -50 %}Entladen {{ (p | abs) | round(0) }} W
                {% else %}Halten{% endif %}
              {% else %}
                Batterie-Empfehlung: —
              {% endif %}
            secondary: >-
              Akku {{ states('sensor.soc_batt_forecast') | float(0) | round(0) }}% (Empfehlung)
              · {{ states('sensor.battery_level') | float(0) | round(0) }}% (Aktuell)
            icon: mdi:battery-sync
            icon_color: >-
              {% set p = states('sensor.p_batt_forecast') | float(0) %}
              {% if p > 50 %}green{% elif p < -50 %}orange{% else %}grey{% endif %}
            entity: sensor.p_batt_forecast
          - type: custom:mushroom-template-card
            primary: >-
              {% if states('sensor.p_grid_forecast') not in ['unknown', 'unavailable'] %}
                {% set g = states('sensor.p_grid_forecast') | float(0) %}
                Netz-Empfehlung: {% if g > 50 %}Bezug {{ g | round(0) }} W
                {% elif g < -50 %}Einspeisung {{ (g | abs) | round(0) }} W
                {% else %}~0 W{% endif %}
              {% else %}
                Netz-Empfehlung: —
              {% endif %}
            secondary: >-
              Börsenpreis: {{ (states('sensor.unit_load_cost') | float(0) * 100) | round(2) }} ct/kWh
            icon: mdi:transmission-tower
            icon_color: >-
              {% set g = states('sensor.p_grid_forecast') | float(0) %}
              {% if g > 50 %}red{% elif g < -50 %}green{% else %}grey{% endif %}
            entity: sensor.p_grid_forecast
          - type: custom:mushroom-template-card
            primary: >-
              Erwarteter Tagesgewinn: {{ states('sensor.total_cost_fun_value') | float(0) | round(2) }} €
            secondary: >-
              Einspeisevergütung: 8,20 ct/kWh
            icon: mdi:piggy-bank
            icon_color: >-
              {% set p = states('sensor.total_cost_fun_value') | float(0) %}
              {% if p > 0 %}green{% elif p < 0 %}red{% else %}grey{% endif %}
            entity: sensor.total_cost_fun_value
          # Leistungs-Empfehlung
          - type: custom:apexcharts-card
            header:
              show: true
              title: "Empfohlener Leistungsverlauf"
              show_states: true
              colorize_states: true
            now:
              show: true
              label: Jetzt
            graph_span: 24h
            span:
              start: day
            apex_config:
              chart:
                height: 350
              legend:
                show: true
                position: bottom
              tooltip:
                shared: true
                intersect: false
            yaxis:
              - id: power
                apex_config:
                  title:
                    text: Watt
                  labels:
                    formatter: |
                      EVAL:function(val) { return val ? Math.round(val) : '0'; }
            series:
              - entity: sensor.p_pv_forecast
                name: "PV-Erzeugung"
                color: "#f59e0b"
                stroke_width: 2
                curve: stepline
                type: area
                opacity: 0.25
                float_precision: 0
                yaxis_id: power
                show:
                  in_header: before_now
                data_generator: |
                  var fc = entity.attributes.forecasts || [];
                  return fc.map((e) => {
                    return [new Date(e.date).getTime(), parseFloat(e.p_pv_forecast)];
                  });
              - entity: sensor.p_load_forecast
                name: "Hausverbrauch"
                color: "#ec4899"
                stroke_width: 2
                curve: stepline
                type: area
                opacity: 0.15
                float_precision: 0
                yaxis_id: power
                show:
                  in_header: before_now
                data_generator: |
                  var fc = entity.attributes.forecasts || [];
                  return fc.map((e) => {
                    return [new Date(e.date).getTime(), parseFloat(e.p_load_forecast)];
                  });
              - entity: sensor.p_batt_forecast
                name: "Akku (+Entladen / −Laden)"
                color: "#22c55e"
                stroke_width: 2
                curve: stepline
                float_precision: 0
                yaxis_id: power
                extend_to: false
                group_by:
                  func: last
                  duration: 30min
              - entity: sensor.p_grid_forecast
                name: "Netz (+Bezug / −Einspeisung)"
                color: "#06b6d4"
                stroke_width: 2
                curve: stepline
                float_precision: 0
                yaxis_id: power
                show:
                  in_header: before_now
                data_generator: |
                  var fc = entity.attributes.forecasts || [];
                  return fc.map((e) => {
                    return [new Date(e.date).getTime(), parseFloat(e.p_grid_forecast)];
                  });
          # Akkustand: Empfehlung vs. Realität
          - type: custom:apexcharts-card
            header:
              show: true
              title: "Akkustand: Empfehlung vs. Realität"
            now:
              show: true
              label: Jetzt
            graph_span: 24h
            span:
              start: day
            apex_config:
              chart:
                height: 220
              legend:
                show: true
              tooltip:
                shared: true
                intersect: false
            yaxis:
              - id: soc
                min: 0
                max: 100
                apex_config:
                  title:
                    text: "%"
            series:
              - entity: sensor.soc_batt_forecast
                name: "Empfehlung"
                color: "#4CAF50"
                stroke_width: 2
                curve: stepline
                extend_to: false
                yaxis_id: soc
                group_by:
                  func: last
                  duration: 30min
              - entity: sensor.battery_level
                name: "Aktuell"
                color: "#FF9800"
                stroke_width: 2
                curve: smooth
                extend_to: false
                yaxis_id: soc
                group_by:
                  func: avg
                  duration: 15min
          # Börsenpreis-Verlauf
          - type: custom:apexcharts-card
            header:
              show: true
              title: "Börsenpreis (ENTSO-e)"
            now:
              show: true
              label: Jetzt
            graph_span: 24h
            span:
              start: day
            apex_config:
              chart:
                height: 180
              legend:
                show: true
              tooltip:
                shared: true
                intersect: false
            yaxis:
              - id: cost
                min: 0
                apex_config:
                  title:
                    text: "€/kWh"
                  labels:
                    formatter: |
                      EVAL:function(val) { return val ? val.toFixed(2) : '0.00'; }
            series:
              - entity: sensor.unit_load_cost
                name: "Bezugspreis"
                color: "#F44336"
                stroke_width: 2
                curve: stepline
                float_precision: 2
                extend_to: false
                yaxis_id: cost
                group_by:
                  func: last
                  duration: 30min
              - entity: sensor.unit_prod_price
                name: "Einspeisevergütung"
                color: "#4CAF50"
                stroke_width: 2
                float_precision: 2
                curve: stepline
                extend_to: false
                yaxis_id: cost
                group_by:
                  func: last
                  duration: 30min
          # Aktions-Buttons
          - type: heading
            heading: "EMHASS Aktionen"
          - type: button
            name: "Day-Ahead Optimierung"
            icon: mdi:chart-timeline-variant-shimmer
            icon_height: 40px
            tap_action:
              action: call-service
              service: rest_command.emhass_dayahead
              confirmation:
                text: "EMHASS Day-Ahead Optimierung jetzt starten?"
          - type: button
            name: "Sensoren aktualisieren"
            icon: mdi:publish
            icon_height: 40px
            tap_action:
              action: call-service
              service: rest_command.emhass_publish
              confirmation:
                text: "EMHASS Sensoren in HA aktualisieren?"

      # ── Batterie-Steuerung ──────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: "Batterie-Steuerung"
          - type: custom:mushroom-template-card
            primary: >-
              {% if is_state_attr('select.battery_forced_charge_discharge', 'state', 'Forced charge') or
                    states('select.battery_forced_charge_discharge') == 'Forced charge' %}
                Zwangsladen aktiv
              {% else %}
                Eigenverbrauchsmodus
              {% endif %}
            secondary: >-
              SOC {{ states('sensor.battery_level') }}% · Ladeleistung {{ states('sensor.battery_charging_power') }} W
            icon: >-
              {% if states('select.battery_forced_charge_discharge') == 'Forced charge' %}
                mdi:battery-charging-high
              {% else %}
                mdi:battery-check
              {% endif %}
            icon_color: >-
              {% if states('select.battery_forced_charge_discharge') == 'Forced charge' %}
                orange
              {% else %}
                green
              {% endif %}
            entity: select.battery_forced_charge_discharge
          - type: button
            name: "Zwangsladen 1h / 5kW"
            icon: mdi:battery-charging-60
            icon_height: 40px
            tap_action:
              action: call-service
              service: script.batterie_zwangsladen
              data:
                dauer_stunden: 1
                ladeleistung: 5000
              confirmation:
                text: "Batterie 1 Stunde mit 5 kW zwangsladen?"
          - type: button
            name: "Zwangsladen 2h / 5kW"
            icon: mdi:battery-charging-80
            icon_height: 40px
            tap_action:
              action: call-service
              service: script.batterie_zwangsladen
              data:
                dauer_stunden: 2
                ladeleistung: 5000
              confirmation:
                text: "Batterie 2 Stunden mit 5 kW zwangsladen?"
          - type: button
            name: "Zwangsladen stoppen"
            icon: mdi:stop-circle-outline
            icon_height: 40px
            tap_action:
              action: call-service
              service: scene.turn_on
              target:
                entity_id: scene.self_consumption_mode_max_battery_discharge
              confirmation:
                text: "Zwangsladen abbrechen und auf Eigenverbrauch wechseln?"

      # ── Wärmepumpe ─────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: "Wärmepumpe"
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.kg_technik_waermepumpe_3em_leistung') | float(0) | round(0) }} W"
            secondary: >-
              {% set cap = states('sensor.licv_8_2r1_3_heating_capacity') | float(0) %}
              {% set pow = states('sensor.kg_technik_waermepumpe_3em_leistung') | float(0) / 1000 %}
              {% if pow > 0.1 and cap > 0 %}
                Heizleistung {{ cap }} kW · COP {{ (cap / pow) | round(1) }}
              {% elif pow > 0.1 %}
                Novelan LICV 8.2 · läuft
              {% else %}
                Novelan LICV 8.2 · Standby
              {% endif %}
            icon: mdi:heat-pump-outline
            icon_color: >-
              {% set p = states('sensor.kg_technik_waermepumpe_3em_leistung') | float(0) %}
              {% if p < 100 %}grey{% elif p < 2000 %}blue{% else %}red{% endif %}
            entity: sensor.kg_technik_waermepumpe_3em_leistung
          - type: custom:mushroom-template-card
            primary: "Extra Warmwasser"
            secondary: >-
              {% if is_state('switch.licv_8_2r1_3_extra_dhw', 'on') %}
                Läuft · WW {{ states('sensor.licv_8_2r1_3_dhw') }}°C → {{ states('number.licv_8_2r1_3_desired_value') }}°C
              {% else %}
                Aus · WW aktuell {{ states('sensor.licv_8_2r1_3_dhw') }}°C
              {% endif %}
            icon: mdi:water-boiler
            icon_color: >-
              {% if is_state('switch.licv_8_2r1_3_extra_dhw', 'on') %}orange{% else %}grey{% endif %}
            entity: switch.licv_8_2r1_3_extra_dhw
            tap_action:
              action: toggle
              confirmation:
                text: "Extra Warmwasser umschalten?"
          - type: custom:mushroom-entity-card
            entity: sensor.licv_8_2r1_3_flow
            name: Vorlauf
            icon: mdi:thermometer-chevron-up
            icon_color: red
          - type: custom:mushroom-entity-card
            entity: sensor.licv_8_2r1_3_return
            name: Rücklauf
            icon: mdi:thermometer-chevron-down
            icon_color: blue
          - type: custom:mushroom-entity-card
            entity: sensor.licv_8_2r1_3_dhw
            name: Warmwasser
            icon: mdi:water-thermometer
            icon_color: orange
          - type: custom:mushroom-entity-card
            entity: sensor.licv_8_2r1_3_outdoor_temp
            name: Außentemperatur
            icon: mdi:home-thermometer-outline
            icon_color: green
          - type: custom:mushroom-entity-card
            entity: sensor.licv_8_2r1_3_heating_capacity
            name: Heizleistung
            icon: mdi:fire
            icon_color: red
          - type: custom:mushroom-entity-card
            entity: sensor.licv_8_2r1_3_power_consumption
            name: Stromaufnahme (myUplink)
            icon: mdi:flash
            icon_color: amber
          - type: custom:mushroom-entity-card
            entity: sensor.licv_8_2r1_3_heating
            name: Heizung gesamt
            icon: mdi:counter
            icon_color: red
          - type: custom:mushroom-entity-card
            entity: sensor.licv_8_2r1_3_domestic_hot_water
            name: Warmwasser gesamt
            icon: mdi:counter
            icon_color: orange
          - type: custom:mushroom-entity-card
            entity: sensor.licv_8_2r1_3_operat_hours_heat
            name: Betriebsstunden Heizen
            icon: mdi:clock-outline
            icon_color: grey
          - type: custom:mushroom-entity-card
            entity: sensor.licv_8_2r1_3_operating_hours_dhw
            name: Betriebsstunden WW
            icon: mdi:clock-outline
            icon_color: grey
          - type: heading
            heading: "COP (Leistungszahl)"
          - type: markdown
            content: |
              ### Monatlich
              {% set el = states('sensor.wp_strom_monatlich') | float(0) %}
              {% if el > 1 %}
              | | Thermisch | Elektrisch | COP |
              |---|---|---|---|
              | **Heizung** | {{ states('sensor.wp_heizung_thermisch_monatlich') }} kWh | — | **{{ states('sensor.wp_cop_heizung_monatlich') }}** |
              | **Warmwasser** | {{ states('sensor.wp_ww_thermisch_monatlich') }} kWh | — | **{{ states('sensor.wp_cop_warmwasser_monatlich') }}** |
              | **Kombiniert** | {{ (states('sensor.wp_heizung_thermisch_monatlich') | float(0) + states('sensor.wp_ww_thermisch_monatlich') | float(0)) | round(1) }} kWh | {{ el | round(1) }} kWh | **{{ states('sensor.wp_cop_kombiniert_monatlich') }}** |
              {% else %}
              *Noch nicht genug Daten für diesen Monat.*
              {% endif %}

              ### Gesamt (seit Tracking)
              {% set el_t = states('sensor.wp_strom_gesamt') | float(0) %}
              {% if el_t > 1 %}
              | | Thermisch | Elektrisch | COP |
              |---|---|---|---|
              | **Heizung** | {{ states('sensor.wp_heizung_thermisch_gesamt') }} kWh | — | **{{ states('sensor.wp_cop_heizung_gesamt') }}** |
              | **Warmwasser** | {{ states('sensor.wp_ww_thermisch_gesamt') }} kWh | — | **{{ states('sensor.wp_cop_warmwasser_gesamt') }}** |
              | **Kombiniert** | {{ (states('sensor.wp_heizung_thermisch_gesamt') | float(0) + states('sensor.wp_ww_thermisch_gesamt') | float(0)) | round(1) }} kWh | {{ el_t | round(1) }} kWh | **{{ states('sensor.wp_cop_kombiniert_gesamt') }}** |
              {% else %}
              *Noch nicht genug Daten.*
              {% endif %}
          - type: custom:mushroom-template-card
            primary: "COP Heizung: {{ states('sensor.wp_cop_heizung_monatlich') }}"
            secondary: "Gesamt: {{ states('sensor.wp_cop_heizung_gesamt') }}"
            icon: mdi:heat-pump
            icon_color: >-
              {% set cop = states('sensor.wp_cop_heizung_monatlich') | float(0) %}
              {% if cop > 3.5 %}green{% elif cop > 2.5 %}amber{% else %}red{% endif %}
            entity: sensor.wp_cop_heizung_monatlich
          - type: custom:mushroom-template-card
            primary: "COP Warmwasser: {{ states('sensor.wp_cop_warmwasser_monatlich') }}"
            secondary: "Gesamt: {{ states('sensor.wp_cop_warmwasser_gesamt') }}"
            icon: mdi:water-boiler
            icon_color: >-
              {% set cop = states('sensor.wp_cop_warmwasser_monatlich') | float(0) %}
              {% if cop > 3.5 %}green{% elif cop > 2.5 %}amber{% else %}red{% endif %}
            entity: sensor.wp_cop_warmwasser_monatlich
          - type: custom:mushroom-template-card
            primary: "COP Kombiniert: {{ states('sensor.wp_cop_kombiniert_monatlich') }}"
            secondary: "Gesamt: {{ states('sensor.wp_cop_kombiniert_gesamt') }}"
            icon: mdi:heat-pump-outline
            icon_color: >-
              {% set cop = states('sensor.wp_cop_kombiniert_monatlich') | float(0) %}
              {% if cop > 3.5 %}green{% elif cop > 2.5 %}amber{% else %}red{% endif %}
            entity: sensor.wp_cop_kombiniert_monatlich
          # ── WP Status-LEDs ──────────────────────────
          - type: heading
            heading: "Status"
          - type: custom:mushroom-template-card
            primary: >-
              {% set mode = states('sensor.licv_8_2r1_3_operation_mode') | float(0) | int %}
              {% set modes = {0: 'Heizen', 1: 'Warmwasser', 2: 'Kühlen', 3: 'Abtauen', 4: 'Schwimmbad', 5: 'Standby', 6: 'EVU-Sperre', 7: 'Fehler'} %}
              {{ modes.get(mode, 'Unbekannt (' ~ mode ~ ')') }}
            secondary: >-
              {% if is_state('binary_sensor.licv_8_2r1_3_vd1', 'on') %}Verdichter läuft{% else %}Verdichter aus{% endif %}
              {% if is_state('binary_sensor.licv_8_2r1_3_el_heater', 'on') %} · Heizstab aktiv!{% endif %}
            icon: >-
              {% set mode = states('sensor.licv_8_2r1_3_operation_mode') | float(0) | int %}
              {% if mode == 0 %}mdi:radiator{% elif mode == 1 %}mdi:water-boiler{% elif mode == 3 %}mdi:snowflake-melt{% elif mode == 7 %}mdi:alert{% else %}mdi:heat-pump-outline{% endif %}
            icon_color: >-
              {% if is_state('binary_sensor.licv_8_2r1_3_el_heater', 'on') %}red
              {% elif is_state('binary_sensor.licv_8_2r1_3_vd1', 'on') %}blue
              {% else %}grey{% endif %}
            entity: sensor.licv_8_2r1_3_operation_mode
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                content: >-
                  VD1 {{ 'AN' if is_state('binary_sensor.licv_8_2r1_3_vd1', 'on') else 'AUS' }}
                icon: mdi:heat-pump
                icon_color: >-
                  {{ 'blue' if is_state('binary_sensor.licv_8_2r1_3_vd1', 'on') else 'grey' }}
                entity: binary_sensor.licv_8_2r1_3_vd1
              - type: template
                content: >-
                  Heizstab {{ 'AN' if is_state('binary_sensor.licv_8_2r1_3_el_heater', 'on') else 'AUS' }}
                icon: mdi:lightning-bolt
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.licv_8_2r1_3_el_heater', 'on') else 'grey' }}
                entity: binary_sensor.licv_8_2r1_3_el_heater
              - type: template
                content: >-
                  HUP {{ 'AN' if is_state('binary_sensor.licv_8_2r1_3_hup', 'on') else 'AUS' }}
                icon: mdi:pump
                icon_color: >-
                  {{ 'cyan' if is_state('binary_sensor.licv_8_2r1_3_hup', 'on') else 'grey' }}
                entity: binary_sensor.licv_8_2r1_3_hup
              - type: template
                content: >-
                  EVU {{ 'Frei' if is_state('binary_sensor.licv_8_2r1_3_evu', 'on') else 'Sperre!' }}
                icon: mdi:transmission-tower
                icon_color: >-
                  {{ 'green' if is_state('binary_sensor.licv_8_2r1_3_evu', 'on') else 'red' }}
                entity: binary_sensor.licv_8_2r1_3_evu
          # ── WP Steuerung ─────────────────────────────
          - type: heading
            heading: "Steuerung"
          - type: custom:mushroom-template-card
            primary: "Heizung sperren"
            secondary: >-
              {% if is_state('switch.licv_8_2r1_3_heating_blocked', 'on') %}
                Heizung gesperrt!
              {% else %}
                Heizung freigegeben
              {% endif %}
            icon: mdi:radiator-off
            icon_color: >-
              {% if is_state('switch.licv_8_2r1_3_heating_blocked', 'on') %}red{% else %}grey{% endif %}
            entity: switch.licv_8_2r1_3_heating_blocked
            tap_action:
              action: toggle
              confirmation:
                text: "Heizung sperren/freigeben?"
          - type: custom:mushroom-template-card
            primary: "Warmwasser sperren"
            secondary: >-
              {% if is_state('switch.licv_8_2r1_3_dhw_blocked', 'on') %}
                WW gesperrt!
              {% else %}
                WW freigegeben
              {% endif %}
            icon: mdi:water-off
            icon_color: >-
              {% if is_state('switch.licv_8_2r1_3_dhw_blocked', 'on') %}red{% else %}grey{% endif %}
            entity: switch.licv_8_2r1_3_dhw_blocked
            tap_action:
              action: toggle
              confirmation:
                text: "Warmwasser sperren/freigeben?"
          # ── SG-Ready / PV-Optimierung ────────────────
          - type: heading
            heading: "SG-Ready / PV-Optimierung"
          - type: custom:mushroom-select-card
            entity: select.licv_8_2r1_3_modus_heizen
            name: "Modus Heizung"
            icon: mdi:radiator
          - type: custom:mushroom-number-card
            entity: number.licv_8_2r1_3_offset_heizen
            name: "Offset Heizung"
            icon: mdi:thermometer-plus
            display_mode: slider
          - type: custom:mushroom-select-card
            entity: select.licv_8_2r1_3_modus_warmw
            name: "Modus Warmwasser"
            icon: mdi:water-boiler
          - type: custom:mushroom-number-card
            entity: number.licv_8_2r1_3_offset_warmw
            name: "Offset Warmwasser"
            icon: mdi:thermometer-plus
            display_mode: slider
          - type: custom:mushroom-select-card
            entity: select.licv_8_2r1_3_power_control_mode
            name: "SG-Ready Stufe"
            icon: mdi:transmission-tower
          - type: custom:mushroom-select-card
            entity: select.licv_8_2r1_3_smart_mode
            name: "Smart-Modus"
            icon: mdi:home-account
          # ── Temperatur-Charts ────────────────────────
          - type: custom:apexcharts-card
            header:
              show: true
              title: Temperaturen
            graph_span: 24h
            span:
              start: day
            apex_config:
              chart:
                height: 250
              legend:
                show: true
              tooltip:
                shared: true
                intersect: false
            yaxis:
              - id: temp
                apex_config:
                  title:
                    text: "°C"
            series:
              - entity: sensor.licv_8_2r1_3_flow
                name: Vorlauf
                color: "#F44336"
                stroke_width: 2
                curve: smooth
                extend_to: false
                group_by:
                  func: avg
                  duration: 5min
                yaxis_id: temp
              - entity: sensor.licv_8_2r1_3_return
                name: Rücklauf
                color: "#2196F3"
                stroke_width: 2
                curve: smooth
                extend_to: false
                group_by:
                  func: avg
                  duration: 5min
                yaxis_id: temp
              - entity: sensor.licv_8_2r1_3_dhw
                name: Warmwasser
                color: "#FF9800"
                stroke_width: 2
                curve: smooth
                extend_to: false
                group_by:
                  func: avg
                  duration: 5min
                yaxis_id: temp
              - entity: sensor.licv_8_2r1_3_outdoor_temp
                name: Außen
                color: "#4CAF50"
                stroke_width: 1
                curve: smooth
                extend_to: false
                group_by:
                  func: avg
                  duration: 5min
                yaxis_id: temp
          - type: custom:apexcharts-card
            header:
              show: true
              title: Stromverbrauch WP (Shelly 3EM)
            graph_span: 24h
            span:
              start: day
            apex_config:
              chart:
                height: 200
              legend:
                show: false
              tooltip:
                shared: true
                intersect: false
            yaxis:
              - id: power
                min: 0
                apex_config:
                  title:
                    text: Watt
            series:
              - entity: sensor.kg_technik_waermepumpe_3em_leistung
                name: Verbrauch
                color: "#2196F3"
                stroke_width: 2
                curve: smooth
                type: area
                opacity: 0.3
                extend_to: false
                group_by:
                  func: avg
                  duration: 5min
                yaxis_id: power
