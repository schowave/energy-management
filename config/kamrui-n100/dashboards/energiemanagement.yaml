views:
  - type: sections
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Strompreis
          - type: custom:apexcharts-card
            header:
              show: true
              title: "Preisverlauf: 1komma5° vs. ENTSO-e Börse"
            graph_span: 24h
            span:
              start: day
            apex_config:
              chart:
                height: 280
              tooltip:
                shared: true
              legend:
                show: true
            yaxis:
              - id: price
                min: 0
                apex_config:
                  title:
                    text: EUR/kWh
                  labels:
                    formatter: |
                      EVAL:function(val) { return val ? val.toFixed(2) : '0'; }
            series:
              - entity: sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45
                name: "1komma5° Real"
                color: "#4CAF50"
                stroke_width: 2
                float_precision: 2
                extend_to: false
                yaxis_id: price
                group_by:
                  func: avg
                  duration: 5min
              - entity: sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45
                name: "1komma5° Forecast"
                color: "#4CAF50"
                stroke_width: 1
                curve: stepline
                float_precision: 2
                opacity: 0.5
                yaxis_id: price
                data_generator: |
                  const forecast = entity.attributes.forecast || [];
                  return forecast.map(f => [
                    new Date(f.datetime).getTime(),
                    f.price
                  ]);
              - entity: sensor.current_electricity_market_price
                name: "ENTSO-e Börse"
                color: "#FF9800"
                stroke_width: 2
                curve: stepline
                float_precision: 2
                extend_to: false
                yaxis_id: price
                group_by:
                  func: avg
                  duration: 60min
              - entity: sensor.average_electricity_price
                name: "ENTSO-e Forecast"
                color: "#FF9800"
                stroke_width: 1
                curve: stepline
                float_precision: 2
                opacity: 0.5
                yaxis_id: price
                data_generator: |
                  const today = entity.attributes.prices_today || [];
                  const tomorrow = entity.attributes.prices_tomorrow || [];
                  const all = [...today, ...tomorrow];
                  return all.map(f => [
                    new Date(f.time).getTime(),
                    f.price
                  ]);
          - type: entity
            entity: sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45
            name: "1komma5° aktuell"
            icon: mdi:lightning-bolt
          - type: entity
            entity: sensor.current_electricity_market_price
            name: "ENTSO-e aktuell"
            icon: mdi:currency-eur
          - type: entity
            entity: sensor.lowest_energy_price
            name: "ENTSO-e Minimum"
            icon: mdi:arrow-down-bold
          - type: entity
            entity: sensor.highest_energy_price
            name: "ENTSO-e Maximum"
            icon: mdi:arrow-up-bold
          - type: markdown
            content: |
              {% set hour = state_attr('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45', 'cheapest_upcoming_hour') %}
              {% set price = state_attr('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45', 'cheapest_upcoming_price') %}
              {% if hour and price %}
              🕐 Günstigste (1k5): **{{ as_timestamp(hour) | timestamp_custom('%H:%M') }} Uhr** — {{ price }} EUR/kWh
              {% else %}
              🕐 Keine günstigere Stunde mehr heute
              {% endif %}
              {% set diff = states('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45') | float(0) - states('sensor.current_electricity_market_price') | float(0) %}
              💰 Aufschlag 1komma5° vs. Börse: **{{ (diff * 100) | round(1) }} ct/kWh**
      - type: grid
        cards:
          - type: heading
            heading: PV-Erzeugung
          - type: gauge
            entity: sensor.total_dc_power
            name: PV aktuell
            unit: W
            min: 0
            max: 10000
            severity:
              green: 3000
              yellow: 1000
              red: 0
          - type: custom:apexcharts-card
            header:
              show: true
              title: PV Real vs. Solcast Forecast
            graph_span: 24h
            span:
              start: day
            apex_config:
              chart:
                height: 300
              legend:
                show: true
              tooltip:
                shared: true
            yaxis:
              - id: power
                min: 0
                apex_config:
                  title:
                    text: Watt
            series:
              - entity: sensor.total_dc_power
                name: PV Real
                color: '#FF6B35'
                stroke_width: 2
                curve: smooth
                extend_to: false
                group_by:
                  func: avg
                  duration: 5min
                yaxis_id: power
              - entity: sensor.solcast_pv_forecast_prognose_heute
                name: Forecast
                color: '#2196F3'
                stroke_width: 2
                curve: smooth
                yaxis_id: power
                data_generator: |
                  return entity.attributes.detailedForecast.map(f => [
                    new Date(f.period_start).getTime(),
                    f.pv_estimate * 1000
                  ]);
              - entity: sensor.solcast_pv_forecast_prognose_heute
                name: Optimistisch (90)
                color: '#2196F3'
                stroke_width: 0
                type: area
                opacity: 0.15
                curve: smooth
                yaxis_id: power
                data_generator: |
                  return entity.attributes.detailedForecast.map(f => [
                    new Date(f.period_start).getTime(),
                    f.pv_estimate90 * 1000
                  ]);
              - entity: sensor.solcast_pv_forecast_prognose_heute
                name: Pessimistisch (10)
                color: '#2196F3'
                stroke_width: 0
                type: area
                opacity: 0.15
                curve: smooth
                yaxis_id: power
                data_generator: |
                  return entity.attributes.detailedForecast.map(f => [
                    new Date(f.period_start).getTime(),
                    f.pv_estimate10 * 1000
                  ]);
          - type: entity
            entity: sensor.daily_pv_generation
            name: PV heute (real)
            icon: mdi:solar-power
          - type: entity
            entity: sensor.solcast_pv_forecast_prognose_heute
            name: PV heute (Prognose)
            icon: mdi:chart-line
          - type: entity
            entity: sensor.solcast_pv_forecast_prognose_verbleibende_leistung_heute
            name: PV verbleibend
            icon: mdi:sun-clock
      - type: grid
        cards:
          - type: heading
            heading: Batterie
          - type: gauge
            entity: sensor.battery_level
            name: Ladestand
            unit: '%'
            min: 0
            max: 100
            severity:
              green: 50
              yellow: 20
              red: 0
          - type: custom:apexcharts-card
            header:
              show: true
              title: Batterie Lade-/Entladeleistung
            graph_span: 24h
            span:
              start: day
            apex_config:
              chart:
                height: 250
              legend:
                show: true
              tooltip:
                shared: true
            series:
              - entity: sensor.battery_charging_power
                name: Laden
                color: '#4CAF50'
                type: column
                group_by:
                  func: avg
                  duration: 15min
              - entity: sensor.battery_discharging_power
                name: Entladen
                color: '#F44336'
                type: column
                invert: true
                group_by:
                  func: avg
                  duration: 15min
          - type: entity
            entity: sensor.daily_battery_charge
            name: Geladen heute
            icon: mdi:battery-plus
          - type: entity
            entity: sensor.daily_battery_discharge
            name: Entladen heute
            icon: mdi:battery-minus
      - type: grid
        cards:
          - type: heading
            heading: Netz
          - type: custom:apexcharts-card
            header:
              show: true
              title: Netzbezug / Einspeisung
            graph_span: 24h
            span:
              start: day
            apex_config:
              chart:
                height: 250
              legend:
                show: true
              tooltip:
                shared: true
            series:
              - entity: sensor.import_power
                name: Bezug
                color: '#F44336'
                type: column
                group_by:
                  func: avg
                  duration: 15min
              - entity: sensor.export_power
                name: Einspeisung
                color: '#4CAF50'
                type: column
                invert: true
                group_by:
                  func: avg
                  duration: 15min
          - type: entity
            entity: sensor.daily_imported_energy
            name: Import heute
            icon: mdi:transmission-tower-import
          - type: entity
            entity: sensor.daily_exported_energy
            name: Export heute
            icon: mdi:transmission-tower-export
      - type: grid
        cards:
          - type: heading
            heading: Verbrauch & Autarkie
          - type: gauge
            entity: sensor.autarkiegrad
            name: Autarkiegrad
            unit: '%'
            min: 0
            max: 100
            severity:
              green: 70
              yellow: 40
              red: 0
          - type: gauge
            entity: sensor.eigenverbrauchsquote
            name: Eigenverbrauch
            unit: '%'
            min: 0
            max: 100
            severity:
              green: 70
              yellow: 40
              red: 0
          - type: gauge
            entity: sensor.load_power
            name: Hausverbrauch
            unit: W
            min: 0
            max: 5000
            severity:
              green: 0
              yellow: 2000
              red: 3500
          - type: custom:apexcharts-card
            header:
              show: true
              title: Verbrauch-Verlauf
            graph_span: 24h
            span:
              start: day
            apex_config:
              chart:
                height: 250
            yaxis:
              - id: power
                min: 0
                apex_config:
                  title:
                    text: Watt
            series:
              - entity: sensor.load_power
                name: Hausverbrauch
                color: '#FF9800'
                stroke_width: 2
                curve: smooth
                type: area
                opacity: 0.3
                extend_to: false
                group_by:
                  func: avg
                  duration: 5min
                yaxis_id: power
      - type: grid
        cards:
          - type: heading
            heading: Solcast Forecast
          - type: entity
            entity: sensor.solcast_pv_forecast_prognose_morgen
            name: Prognose morgen
            icon: mdi:weather-sunny
          - type: entity
            entity: sensor.solcast_pv_forecast_prognose_spitzenleistung_heute
            name: Peak heute
            icon: mdi:arrow-up-bold
          - type: entity
            entity: sensor.solcast_pv_forecast_prognose_spitzenleistung_morgen
            name: Peak morgen
            icon: mdi:arrow-up-bold-outline
          - type: entity
            entity: sensor.solcast_pv_forecast_prognose_aktuelle_stunde
            name: Aktuelle Stunde
            icon: mdi:clock-outline
          - type: entity
            entity: sensor.solcast_pv_forecast_prognose_nachste_stunde
            name: Nächste Stunde
            icon: mdi:clock-fast
          - type: entity
            entity: sensor.solcast_pv_forecast_leistung_in_30_minuten
            name: In 30 Min
            icon: mdi:timer-sand
          - type: entity
            entity: sensor.solcast_pv_forecast_leistung_in_1_stunde
            name: In 1 Stunde
            icon: mdi:timer-outline
      - type: grid
        cards:
          - type: tile
            entity: sensor.average_electricity_price
          - type: tile
            entity: sensor.current_electricity_market_price
          - type: tile
            entity: sensor.current_percentage_in_electricity_price_range
          - type: tile
            entity: sensor.current_percentage_of_highest_electricity_price
          - type: tile
            entity: sensor.highest_energy_price
          - type: tile
            entity: sensor.lowest_energy_price
          - type: tile
            entity: sensor.next_hour_electricity_market_price
          - type: tile
            entity: sensor.time_of_highest_price
          - type: tile
            entity: sensor.time_of_lowest_price
        title: entso-e
