# EMHASS Package: REST Commands + Automationen
# Eingebunden via configuration.yaml → homeassistant.packages.emhass

rest_command:
  # Day-Ahead Optimierung mit ENTSO-e Börsenpreisen + Solcast PV-Forecast
  # 48 Werte (24h × 2 bei 30-Min-Schritten), ab aktueller Stunde
  emhass_dayahead:
    url: "http://5b918bf2-emhass:5000/action/dayahead-optim"
    method: POST
    content_type: "application/json"
    timeout: 120
    payload: >-
      {%- set all_prices = state_attr('sensor.average_electricity_price', 'prices') or [] -%}
      {%- set now_ts = as_timestamp(now()) -%}
      {%- set current_hour_start = as_timestamp(now().replace(minute=0, second=0, microsecond=0)) -%}
      {%- set ns = namespace(prices=[]) -%}
      {%- for f in all_prices -%}
        {%- if as_timestamp(f.time) >= current_hour_start -%}
          {%- set ns.prices = ns.prices + [f.price, f.price] -%}
        {%- endif -%}
      {%- endfor -%}
      {%- set ns.prices = ns.prices[:48] -%}
      {%- set pv_today = state_attr('sensor.solcast_pv_forecast_prognose_heute', 'detailedForecast') or [] -%}
      {%- set pv_tomorrow = state_attr('sensor.solcast_pv_forecast_prognose_morgen', 'detailedForecast') or [] -%}
      {%- set ns2 = namespace(pv=[]) -%}
      {%- for f in pv_today -%}
        {%- if as_timestamp(f.period_start) >= current_hour_start -%}
          {%- set ns2.pv = ns2.pv + [(f.pv_estimate * 1000) | round(0)] -%}
        {%- endif -%}
      {%- endfor -%}
      {%- for f in pv_tomorrow -%}
        {%- set ns2.pv = ns2.pv + [(f.pv_estimate * 1000) | round(0)] -%}
      {%- endfor -%}
      {%- set ns2.pv = ns2.pv[:48] -%}
      {%- if ns2.pv | length < 48 -%}
        {%- for i in range(48 - ns2.pv | length) -%}
          {%- set ns2.pv = ns2.pv + [0] -%}
        {%- endfor -%}
      {%- endif -%}
      {
        "load_cost_forecast": {{ ns.prices | to_json }},
        "prod_price_forecast": [
          {%- for i in range(ns.prices | length) -%}
            0.082{% if not loop.last %},{% endif %}
          {%- endfor -%}
        ],
        "pv_power_forecast": {{ ns2.pv | to_json }},
        "soc_init": {{ states('sensor.battery_level') | float(50) / 100 }},
        "soc_final": 0.1
      }

  # Publish: Aktualisiert EMHASS-Sensoren in HA
  emhass_publish:
    url: "http://5b918bf2-emhass:5000/action/publish-data"
    method: POST

automation:
  - id: emhass_dayahead_daily
    alias: "EMHASS Day-Ahead Optimierung"
    description: >-
      EMHASS-Optimierung 3x täglich:
      05:30 Morgens (Tagesplan), 13:30 (neue ENTSO-e Preise für morgen),
      18:00 (aktualisierter Solcast + Abendplan)
    trigger:
      - platform: time
        at: "05:30:00"
      - platform: time
        at: "13:30:00"
      - platform: time
        at: "18:00:00"
    action:
      - service: rest_command.emhass_dayahead
      - delay: "00:00:30"
      - service: rest_command.emhass_publish
    mode: single
