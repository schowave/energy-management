# EMHASS Package: REST Commands + Automationen
# Eingebunden via configuration.yaml → homeassistant.packages.emhass

rest_command:
  # Day-Ahead: 1× täglich für 24h-Überblick + Forecast-Cache
  emhass_dayahead:
    url: "http://5b918bf2-emhass:5000/action/dayahead-optim"
    method: POST
    content_type: "application/json"
    timeout: 120
    payload: >-
      {%- set forecast = state_attr('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45', 'forecast') or [] -%}
      {%- set ns = namespace(prices=[]) -%}
      {%- for i in range(0, forecast | length - 1, 2) -%}
        {%- set p1 = forecast[i].price | float(0) -%}
        {%- set p2 = forecast[i+1].price | float(0) -%}
        {%- set ns.prices = ns.prices + [((p1 + p2) / 2) | round(4)] -%}
      {%- endfor -%}
      {%- set ns.prices = ns.prices[:48] -%}
      {%- if ns.prices | length < 48 -%}
        {%- set last_price = ns.prices[-1] if ns.prices | length > 0 else 0.30 -%}
        {%- for i in range(48 - ns.prices | length) -%}
          {%- set ns.prices = ns.prices + [last_price] -%}
        {%- endfor -%}
      {%- endif -%}
      {%- set pv_today = state_attr('sensor.solcast_pv_forecast_prognose_heute', 'detailedForecast') or [] -%}
      {%- set pv_tomorrow = state_attr('sensor.solcast_pv_forecast_prognose_morgen', 'detailedForecast') or [] -%}
      {%- set current_half_hour = as_timestamp(now().replace(minute=(now().minute // 30 * 30), second=0, microsecond=0)) -%}
      {%- set ns2 = namespace(pv=[]) -%}
      {%- for f in pv_today -%}
        {%- if as_timestamp(f.period_start) >= current_half_hour -%}
          {%- set ns2.pv = ns2.pv + [(f.pv_estimate * 1000) | round(0)] -%}
        {%- endif -%}
      {%- endfor -%}
      {%- for f in pv_tomorrow -%}
        {%- set ns2.pv = ns2.pv + [(f.pv_estimate * 1000) | round(0)] -%}
      {%- endfor -%}
      {%- set ns2.pv = ns2.pv[:48] -%}
      {%- if ns2.pv | length < 48 -%}
        {%- for i in range(48 - ns2.pv | length) -%}
          {%- set ns2.pv = ns2.pv + [0] -%}
        {%- endfor -%}
      {%- endif -%}
      {
        "load_cost_forecast": {{ ns.prices | to_json }},
        "prod_price_forecast": [
          {%- for i in range(ns.prices | length) -%}
            {{ states('input_number.einspeiseverguetung') | float(0.082) }}{% if not loop.last %},{% endif %}
          {%- endfor -%}
        ],
        "pv_power_forecast": {{ ns2.pv | to_json }},
        "soc_init": {{ states('input_number.emhass_theo_soc') | float(states('sensor.battery_level') | float(50)) / 100 }},
        "soc_final": 0.8
      }

  # MPC: Alle 5 Min mit Echtzeit-Daten, 24h Horizont, 30-Min-Schritte
  # 48 Schritte × 30 Min = 24h (muss zu EMHASS-Config passen)
  # Alle 5 Min neu berechnet → Echtzeit-Reaktion mit aktuellem SOC/Load
  emhass_mpc:
    url: "http://5b918bf2-emhass:5000/action/naive-mpc-optim"
    method: POST
    content_type: "application/json"
    timeout: 90
    payload: >-
      {%- set horizon = 48 -%}
      {%- set forecast = state_attr('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45', 'forecast') or [] -%}
      {%- set ns = namespace(prices=[]) -%}
      {%- for i in range(0, forecast | length - 1, 2) -%}
        {%- set p1 = forecast[i].price | float(0) -%}
        {%- set p2 = forecast[i+1].price | float(0) -%}
        {%- set ns.prices = ns.prices + [((p1 + p2) / 2) | round(4)] -%}
      {%- endfor -%}
      {%- set ns.prices = ns.prices[:horizon] -%}
      {%- if ns.prices | length < horizon -%}
        {%- set last_price = ns.prices[-1] if ns.prices | length > 0 else 0.30 -%}
        {%- for i in range(horizon - ns.prices | length) -%}
          {%- set ns.prices = ns.prices + [last_price] -%}
        {%- endfor -%}
      {%- endif -%}
      {%- set pv_today = state_attr('sensor.solcast_pv_forecast_prognose_heute', 'detailedForecast') or [] -%}
      {%- set pv_tomorrow = state_attr('sensor.solcast_pv_forecast_prognose_morgen', 'detailedForecast') or [] -%}
      {%- set current_half_hour = as_timestamp(now().replace(minute=(now().minute // 30 * 30), second=0, microsecond=0)) -%}
      {%- set ns2 = namespace(pv=[]) -%}
      {%- for f in pv_today + pv_tomorrow -%}
        {%- if as_timestamp(f.period_start) >= current_half_hour -%}
          {%- set ns2.pv = ns2.pv + [(f.pv_estimate * 1000) | round(0)] -%}
        {%- endif -%}
      {%- endfor -%}
      {%- set ns2.pv = ns2.pv[:horizon] -%}
      {%- if ns2.pv | length < horizon -%}
        {%- for i in range(horizon - ns2.pv | length) -%}
          {%- set ns2.pv = ns2.pv + [0] -%}
        {%- endfor -%}
      {%- endif -%}
      {%- set einspeisung = states('input_number.einspeiseverguetung') | float(0.082) -%}
      {
        "prediction_horizon": {{ horizon }},
        "soc_init": {{ states('input_number.emhass_theo_soc') | float(states('sensor.battery_level') | float(50)) / 100 }},
        "soc_final": 0.8,
        "load_cost_forecast": {{ ns.prices | to_json }},
        "prod_price_forecast": [{% for i in range(horizon) %}{{ einspeisung }}{% if not loop.last %},{% endif %}{% endfor %}],
        "pv_power_forecast": {{ ns2.pv | to_json }}
      }

  # Publish: Aktualisiert EMHASS-Sensoren in HA
  emhass_publish:
    url: "http://5b918bf2-emhass:5000/action/publish-data"
    method: POST

  # ML-Forecaster: Trainiert das Lastprognose-Modell
  emhass_ml_fit:
    url: "http://5b918bf2-emhass:5000/action/forecast-model-fit"
    method: POST
    content_type: "application/json"
    timeout: 300
    payload: >-
      {
        "historic_days_to_retrieve": 30,
        "model_type": "load_forecast",
        "var_model": "sensor.load_power",
        "sklearn_model": "KNeighborsRegressor",
        "num_lags": 48,
        "split_date_delta": "48h",
        "perform_backtest": false
      }

  # ML-Forecaster: Erzeugt die Lastprognose
  emhass_ml_predict:
    url: "http://5b918bf2-emhass:5000/action/forecast-model-predict"
    method: POST
    content_type: "application/json"
    timeout: 60
    payload: >-
      {
        "model_type": "load_forecast"
      }

automation:
  # Day-Ahead: 1× täglich morgens für 24h-Plan + Forecast-Cache
  - id: emhass_dayahead_daily
    alias: "EMHASS Day-Ahead (täglich)"
    description: >-
      Tägliche Day-Ahead Optimierung um 00:01 + 05:30 für den
      24h-Überblick im Energiemanagement-Dashboard.
    trigger:
      - platform: time
        at: "00:01:00"
      - platform: time
        at: "05:30:00"
    action:
      - service: rest_command.emhass_dayahead
      - delay: "00:00:30"
      - service: rest_command.emhass_publish
    mode: single

  # ML-Forecaster: Wöchentliches Training (Montag 04:00)
  - id: emhass_ml_weekly_train
    alias: "EMHASS ML Forecaster Training (wöchentlich)"
    description: >-
      Trainiert das ML-Lastprognosemodell wöchentlich mit 30 Tagen
      historischer Daten. KNeighborsRegressor mit 48 Lags (24h).
    trigger:
      - platform: time
        at: "04:00:00"
    condition:
      - condition: time
        weekday:
          - mon
    action:
      - service: rest_command.emhass_ml_fit
    mode: single

  # Theo-SOC: Jede Minute den simulierten EMHASS-Akkustand aktualisieren
  # Nutzt input_number statt this.state (zuverlässiger nach Restart/API-Set)
  - id: emhass_theo_soc_update
    alias: "EMHASS Theo SOC Update (jede Minute)"
    trigger:
      - platform: time_pattern
        minutes: "/1"
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.emhass_theo_soc
        data:
          value: >
            {% set batt = states('sensor.p_batt_forecast') | float(0) %}
            {% set prev = states('input_number.emhass_theo_soc') | float(50) %}
            {% set cap = 12800 %}
            {% set eff = 0.95 %}
            {% if batt > 0 %}
              {% set delta = -batt / 60 / cap * 100 / eff %}
            {% elif batt < 0 %}
              {% set delta = -batt / 60 / cap * 100 * eff %}
            {% else %}
              {% set delta = 0 %}
            {% endif %}
            {% set new_soc = prev + delta %}
            {{ [10, [95, new_soc] | min] | max | round(1) }}
    mode: single

  # Theo-SOC: Midnight-Reset auf realen SOC
  - id: emhass_theo_soc_midnight_reset
    alias: "EMHASS Theo SOC Midnight Reset"
    trigger:
      - platform: time
        at: "00:00:30"
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.emhass_theo_soc
        data:
          value: "{{ states('sensor.battery_level') | float(50) }}"
    mode: single

  # MPC: Alle 5 Min für Echtzeit-Simulation
  - id: emhass_mpc_realtime
    alias: "EMHASS MPC (alle 5 Min)"
    description: >-
      MPC-Optimierung alle 5 Minuten mit Echtzeit-Verbrauch,
      24h Horizont, 30-Min-Schrittweite.
    trigger:
      - platform: time_pattern
        minutes: "/5"
    action:
      - service: rest_command.emhass_mpc
    mode: single
