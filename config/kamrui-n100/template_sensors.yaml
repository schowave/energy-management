# ── Tägliche Kennzahlen ────────────────────────
- sensor:
    - name: "Autarkiegrad"
      unique_id: autarkiegrad_daily
      unit_of_measurement: "%"
      state_class: measurement
      icon: mdi:home-lightning-bolt
      state: >
        {% set pv = states('sensor.daily_pv_generation') | float(0) %}
        {% set import = states('sensor.daily_imported_energy') | float(0) %}
        {% set export = states('sensor.daily_exported_energy') | float(0) %}
        {% set verbrauch = pv + import - export %}
        {% if verbrauch > 0 %}
          {{ ((1 - import / verbrauch) * 100) | round(1) }}
        {% else %}
          0
        {% endif %}

    - name: "Eigenverbrauchsquote"
      unique_id: eigenverbrauchsquote_daily
      unit_of_measurement: "%"
      state_class: measurement
      icon: mdi:solar-power-variant
      state: >
        {% set pv = states('sensor.daily_pv_generation') | float(0) %}
        {% set export = states('sensor.daily_exported_energy') | float(0) %}
        {% if pv > 0 %}
          {{ ((1 - export / pv) * 100) | round(1) }}
        {% else %}
          0
        {% endif %}

# ── 1komma5° Tagesforecast (Trigger-basiert) ──
# Speichert den Forecast um 00:05, damit er im Chart
# für den ganzen Tag sichtbar bleibt (nicht nur Zukunft).
- trigger:
    - platform: time
      at: "00:05:00"
    - platform: state
      entity_id: sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45
      from: "unknown"
    - platform: state
      entity_id: sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45
      from: "unavailable"
  condition:
    - condition: template
      value_template: >-
        {{ states('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45') not in ['unknown', 'unavailable'] }}
  sensor:
    - name: "1komma5 Tagesforecast"
      unique_id: onekomma5_forecast_today
      icon: mdi:lightning-bolt
      state: "{{ now().strftime('%Y-%m-%d') }}"
      attributes:
        midnight_price: >-
          {{ states('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45') | float(0) }}
        forecast_json: >-
          {{ (state_attr('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45', 'forecast') or []) | to_json }}

# ── ENTSO-e Tagespreise (Trigger-basiert) ──
# Speichert prices_today sobald verfügbar, damit keine
# Lücken bei temporären API-Ausfällen entstehen.
- trigger:
    - platform: state
      entity_id: sensor.average_electricity_price
      from: "unavailable"
    - platform: state
      entity_id: sensor.average_electricity_price
      from: "unknown"
    - platform: state
      entity_id: sensor.average_electricity_price
      attribute: prices_today
  condition:
    - condition: template
      value_template: >-
        {{ state_attr('sensor.average_electricity_price', 'prices_today') not in [None, []] }}
  sensor:
    - name: "ENTSO-e Tagespreise"
      unique_id: entsoe_prices_today
      icon: mdi:currency-eur
      state: "{{ now().strftime('%Y-%m-%d') }}"
      attributes:
        prices_today: >-
          {{ state_attr('sensor.average_electricity_price', 'prices_today') | to_json }}
        prices_tomorrow: >-
          {{ (state_attr('sensor.average_electricity_price', 'prices_tomorrow') or []) | to_json }}
        current_price: >-
          {{ states('sensor.current_electricity_market_price') | float(0) }}
        min_price: >-
          {{ states('sensor.lowest_energy_price') | float(0) }}
        max_price: >-
          {{ states('sensor.highest_energy_price') | float(0) }}

# ── Wärmepumpe COP-Sensoren ──────────────────────
# COP = Thermische Energie (myUplink _2, inkl. Heizstab) / Elektrische Energie (Shelly 3EM)
# Strom wird per Tarif-Umschaltung nach Betriebsmodus aufgeteilt:
#   sensor.wp_strom_modus_*_heizen / _warmwasser / _sonstig
# Thermische Energie kommt direkt von myUplink (getrennt nach Heizen/WW).
- sensor:
    # ── Monatlich ──────────────────────────────────
    - name: "WP COP Heizung monatlich"
      unique_id: wp_cop_heating_monthly
      state_class: measurement
      icon: mdi:heat-pump
      state: >
        {% set th = states('sensor.wp_heizung_thermisch_monatlich') | float(0) %}
        {% set el = states('sensor.wp_strom_modus_monatlich_heizen') | float(0) %}
        {% if el > 1 %}
          {{ (th / el) | round(2) }}
        {% else %}
          0
        {% endif %}

    - name: "WP COP Warmwasser monatlich"
      unique_id: wp_cop_dhw_monthly
      state_class: measurement
      icon: mdi:water-boiler
      state: >
        {% set th = states('sensor.wp_warmwasser_thermisch_monatlich') | float(0) %}
        {% set el = states('sensor.wp_strom_modus_monatlich_warmwasser') | float(0) %}
        {% if el > 1 %}
          {{ (th / el) | round(2) }}
        {% else %}
          0
        {% endif %}

    - name: "WP COP kombiniert monatlich"
      unique_id: wp_cop_combined_monthly
      state_class: measurement
      icon: mdi:heat-pump-outline
      state: >
        {% set th_h = states('sensor.wp_heizung_thermisch_monatlich') | float(0) %}
        {% set th_w = states('sensor.wp_warmwasser_thermisch_monatlich') | float(0) %}
        {% set el = states('sensor.wp_strom_monatlich') | float(0) %}
        {% if el > 1 %}
          {{ ((th_h + th_w) / el) | round(2) }}
        {% else %}
          0
        {% endif %}

    # ── Gesamt (seit Tracking) ─────────────────────
    # Nutzt den Shelly-Gesamtzähler für alle COP-Berechnungen,
    # da die Tarif-Meter (heizen/warmwasser/sonstig) zurückgesetzt wurden.
    # Strom wird proportional zur thermischen Energie aufgeteilt.
    - name: "WP COP Heizung gesamt"
      unique_id: wp_cop_heating_total
      state_class: measurement
      icon: mdi:heat-pump
      state: >
        {% set th_h = states('sensor.wp_heizung_thermisch_gesamt_seit_tracking') | float(0) %}
        {% set th_w = states('sensor.wp_warmwasser_thermisch_gesamt_seit_tracking') | float(0) %}
        {% set th_total = th_h + th_w %}
        {% set el_total = states('sensor.wp_strom_gesamt_seit_tracking') | float(0) %}
        {% if el_total > 1 and th_total > 0 %}
          {% set el_h = el_total * (th_h / th_total) %}
          {{ (th_h / el_h) | round(2) if el_h > 0 else 0 }}
        {% else %}
          0
        {% endif %}

    - name: "WP COP Warmwasser gesamt"
      unique_id: wp_cop_dhw_total
      state_class: measurement
      icon: mdi:water-boiler
      state: >
        {% set th_h = states('sensor.wp_heizung_thermisch_gesamt_seit_tracking') | float(0) %}
        {% set th_w = states('sensor.wp_warmwasser_thermisch_gesamt_seit_tracking') | float(0) %}
        {% set th_total = th_h + th_w %}
        {% set el_total = states('sensor.wp_strom_gesamt_seit_tracking') | float(0) %}
        {% if el_total > 1 and th_total > 0 %}
          {% set el_w = el_total * (th_w / th_total) %}
          {{ (th_w / el_w) | round(2) if el_w > 0 else 0 }}
        {% else %}
          0
        {% endif %}

    - name: "WP COP kombiniert gesamt"
      unique_id: wp_cop_combined_total
      state_class: measurement
      icon: mdi:heat-pump-outline
      state: >
        {% set th_h = states('sensor.wp_heizung_thermisch_gesamt_seit_tracking') | float(0) %}
        {% set th_w = states('sensor.wp_warmwasser_thermisch_gesamt_seit_tracking') | float(0) %}
        {% set el = states('sensor.wp_strom_gesamt_seit_tracking') | float(0) %}
        {% if el > 1 %}
          {{ ((th_h + th_w) / el) | round(2) }}
        {% else %}
          0
        {% endif %}

# ── WP Betriebsmodus (Text) ────────────────────────
- sensor:
    - name: "WP Betriebsmodus"
      unique_id: wp_betriebsmodus
      icon: mdi:heat-pump-outline
      state: >
        {% set mode = states('sensor.licv_8_2r1_3_operation_mode') | float(-1) | int %}
        {% set modes = {0: 'Heizen', 1: 'Warmwasser', 2: 'Kühlen', 3: 'EVU-Sperre', 4: 'Abtauen', 5: 'Standby', 7: 'Fehler'} %}
        {{ modes.get(mode, 'Unbekannt') }}

# ── 1komma5° Heartbeat Modus-Tracking ─────────────
- sensor:
    - name: "Heartbeat Modus"
      unique_id: heartbeat_modus
      icon: mdi:heart-pulse
      state: >
        {% set charge = states('sensor.battery_in_power_7fee2e61_1ff6_4eaf_8a8e_7509522abb45') | float(0) %}
        {% set discharge = states('sensor.battery_out_power_7fee2e61_1ff6_4eaf_8a8e_7509522abb45') | float(0) %}
        {% set export = states('sensor.grid_feed_out_power_7fee2e61_1ff6_4eaf_8a8e_7509522abb45') | float(0) %}
        {% if charge > 100 %}laden
        {% elif discharge > 100 %}entladen
        {% elif export < 10 and charge < 100 and discharge < 100 %}zero_export
        {% else %}idle
        {% endif %}

# ── 1komma5° vs EMHASS Kostenvergleich ─────────────
- sensor:
    - name: "1k5 Netzbezugskosten laufend"
      unique_id: 1k5_netzbezugskosten_laufend
      unit_of_measurement: "EUR/h"
      state_class: measurement
      icon: mdi:cash
      state: >
        {% set import_kw = states('sensor.grid_feed_in_power_7fee2e61_1ff6_4eaf_8a8e_7509522abb45') | float(0) / 1000 %}
        {% set export_kw = states('sensor.grid_feed_out_power_7fee2e61_1ff6_4eaf_8a8e_7509522abb45') | float(0) / 1000 %}
        {% set preis = states('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45') | float(0) %}
        {% set einspeisung = states('input_number.einspeiseverguetung') | float(0.082) %}
        {{ (import_kw * preis - export_kw * einspeisung) | round(4) }}

    - name: "EMHASS Theo Kosten laufend"
      unique_id: emhass_theo_kosten_laufend
      unit_of_measurement: "EUR/h"
      state_class: measurement
      icon: mdi:robot
      state: >
        {% set verbrauch = states('sensor.consumption_power_7fee2e61_1ff6_4eaf_8a8e_7509522abb45') | float(0) %}
        {% set pv = states('sensor.solar_production_power_7fee2e61_1ff6_4eaf_8a8e_7509522abb45') | float(0) %}
        {% set batt_raw = states('sensor.p_batt_forecast') | float(0) %}
        {% set soc = states('input_number.emhass_theo_soc') | float(50) %}
        {% set preis = states('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45') | float(0) %}
        {% set einspeisung = states('input_number.einspeiseverguetung') | float(0.082) %}
        {% set batt = batt_raw %}
        {% if batt > 0 and soc <= 12 %}{% set batt = 0 %}{% endif %}
        {% if batt < 0 and soc >= 94 %}{% set batt = 0 %}{% endif %}
        {% set net = (verbrauch - pv - batt) / 1000 %}
        {% set theo_import = [0, net] | max %}
        {% set theo_export = [0, -net] | max %}
        {{ (theo_import * preis - theo_export * einspeisung) | round(4) }}

# ── Wärmepumpen-Kostentracking ─────────────────────
    - name: "WP Stromkosten laufend"
      unique_id: wp_stromkosten_laufend
      unit_of_measurement: "EUR/h"
      state_class: measurement
      icon: mdi:heat-pump
      state: >
        {% set wp_kw = states('sensor.kg_technik_waermepumpe_3em_leistung') | float(0) / 1000 %}
        {% set preis = states('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45') | float(0) %}
        {{ (wp_kw * preis) | round(4) }}

    - name: "WP Einsparpotenzial laufend"
      unique_id: wp_einsparpotenzial_laufend
      unit_of_measurement: "EUR/h"
      state_class: measurement
      icon: mdi:piggy-bank
      state: >
        {% set wp_kw = states('sensor.kg_technik_waermepumpe_3em_leistung') | float(0) / 1000 %}
        {% set preis = states('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45') | float(0) %}
        {% set preis_min = state_attr('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45', 'price_today_min') | float(preis) %}
        {% set einspeisung = states('input_number.einspeiseverguetung') | float(0.082) %}
        {% set pv = states('sensor.solar_production_power_7fee2e61_1ff6_4eaf_8a8e_7509522abb45') | float(0) %}
        {% set verbrauch = states('sensor.consumption_power_7fee2e61_1ff6_4eaf_8a8e_7509522abb45') | float(0) %}
        {% set batt_out = states('sensor.battery_out_power_7fee2e61_1ff6_4eaf_8a8e_7509522abb45') | float(0) %}
        {% set ueberschuss_kw = [0, (pv - verbrauch + batt_out) / 1000] | max %}
        {% if wp_kw <= 0 %}0
        {% elif ueberschuss_kw >= wp_kw %}
          {{ [0, wp_kw * (preis - einspeisung)] | max | round(4) }}
        {% else %}
          {{ [0, wp_kw * (preis - preis_min)] | max | round(4) }}
        {% endif %}

# ── Kumulierte Kosten (Riemann-Summe, jede Minute) ─
# Integriert EUR/h-Rate × 1/60h = EUR pro Minute.
# state_class: total erlaubt Utility Meters als Quelle.
- trigger:
    - platform: time_pattern
      minutes: "/1"
  sensor:
    - name: "1k5 Netzbezugskosten kumuliert"
      unique_id: 1k5_netzbezugskosten_kumuliert
      unit_of_measurement: "EUR"
      state_class: total
      icon: mdi:cash
      state: >
        {% set rate = states('sensor.1k5_netzbezugskosten_laufend') | float(0) %}
        {% set prev = this.state | float(0) %}
        {{ (prev + rate / 60) | round(4) }}

    - name: "EMHASS Theo Kosten kumuliert"
      unique_id: emhass_theo_kosten_kumuliert
      unit_of_measurement: "EUR"
      state_class: total
      icon: mdi:robot
      state: >
        {% set rate = states('sensor.emhass_theo_kosten_laufend') | float(0) %}
        {% set prev = this.state | float(0) %}
        {{ (prev + rate / 60) | round(4) }}

    - name: "WP Stromkosten kumuliert"
      unique_id: wp_stromkosten_kumuliert
      unit_of_measurement: "EUR"
      state_class: total
      icon: mdi:heat-pump
      state: >
        {% set rate = states('sensor.wp_stromkosten_laufend') | float(0) %}
        {% set prev = this.state | float(0) %}
        {{ (prev + rate / 60) | round(4) }}

    - name: "WP Einsparpotenzial kumuliert"
      unique_id: wp_einsparpotenzial_kumuliert
      unit_of_measurement: "EUR"
      state_class: total
      icon: mdi:piggy-bank
      state: >
        {% set rate = states('sensor.wp_einsparpotenzial_laufend') | float(0) %}
        {% set prev = this.state | float(0) %}
        {{ (prev + rate / 60) | round(4) }}
