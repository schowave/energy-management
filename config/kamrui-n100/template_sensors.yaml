# ── Tägliche Kennzahlen ────────────────────────
- sensor:
    - name: "Autarkiegrad"
      unique_id: autarkiegrad_daily
      unit_of_measurement: "%"
      state_class: measurement
      icon: mdi:home-lightning-bolt
      state: >
        {% set pv = states('sensor.daily_pv_generation') | float(0) %}
        {% set import = states('sensor.daily_imported_energy') | float(0) %}
        {% set export = states('sensor.daily_exported_energy') | float(0) %}
        {% set verbrauch = pv + import - export %}
        {% if verbrauch > 0 %}
          {{ ((1 - import / verbrauch) * 100) | round(1) }}
        {% else %}
          0
        {% endif %}

    - name: "Eigenverbrauchsquote"
      unique_id: eigenverbrauchsquote_daily
      unit_of_measurement: "%"
      state_class: measurement
      icon: mdi:solar-power-variant
      state: >
        {% set pv = states('sensor.daily_pv_generation') | float(0) %}
        {% set export = states('sensor.daily_exported_energy') | float(0) %}
        {% if pv > 0 %}
          {{ ((1 - export / pv) * 100) | round(1) }}
        {% else %}
          0
        {% endif %}

# ── 1komma5° Tagesforecast (Trigger-basiert) ──
# Speichert den Forecast um 00:05, damit er im Chart
# für den ganzen Tag sichtbar bleibt (nicht nur Zukunft).
- trigger:
    - platform: time
      at: "00:05:00"
    - platform: state
      entity_id: sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45
      from: "unknown"
    - platform: state
      entity_id: sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45
      from: "unavailable"
  condition:
    - condition: template
      value_template: >-
        {{ states('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45') not in ['unknown', 'unavailable'] }}
  sensor:
    - name: "1komma5 Tagesforecast"
      unique_id: onekomma5_forecast_today
      icon: mdi:lightning-bolt
      state: "{{ now().strftime('%Y-%m-%d') }}"
      attributes:
        midnight_price: >-
          {{ states('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45') | float(0) }}
        forecast_json: >-
          {{ (state_attr('sensor.electricity_price_7fee2e61_1ff6_4eaf_8a8e_7509522abb45', 'forecast') or []) | to_json }}

# ── ENTSO-e Tagespreise (Trigger-basiert) ──
# Speichert prices_today sobald verfügbar, damit keine
# Lücken bei temporären API-Ausfällen entstehen.
- trigger:
    - platform: state
      entity_id: sensor.average_electricity_price
      from: "unavailable"
    - platform: state
      entity_id: sensor.average_electricity_price
      from: "unknown"
    - platform: state
      entity_id: sensor.average_electricity_price
      attribute: prices_today
  condition:
    - condition: template
      value_template: >-
        {{ state_attr('sensor.average_electricity_price', 'prices_today') not in [None, []] }}
  sensor:
    - name: "ENTSO-e Tagespreise"
      unique_id: entsoe_prices_today
      icon: mdi:currency-eur
      state: "{{ now().strftime('%Y-%m-%d') }}"
      attributes:
        prices_today: >-
          {{ state_attr('sensor.average_electricity_price', 'prices_today') | to_json }}
        prices_tomorrow: >-
          {{ (state_attr('sensor.average_electricity_price', 'prices_tomorrow') or []) | to_json }}
        current_price: >-
          {{ states('sensor.current_electricity_market_price') | float(0) }}
        min_price: >-
          {{ states('sensor.lowest_energy_price') | float(0) }}
        max_price: >-
          {{ states('sensor.highest_energy_price') | float(0) }}

# ── Wärmepumpe COP-Sensoren ──────────────────────
# COP = Thermische Energie (myUplink _2, inkl. Heizstab) / Elektrische Energie (Shelly 3EM)
# Monatliche Werte kommen von utility_meter Helpers.
- sensor:
    - name: "WP COP Heizung monatlich"
      unique_id: wp_cop_heating_monthly
      state_class: measurement
      icon: mdi:heat-pump
      state: >
        {% set th = states('sensor.wp_heizung_thermisch_monatlich') | float(0) %}
        {% set el = states('sensor.wp_strom_monatlich') | float(0) %}
        {% if el > 1 %}
          {{ (th / el) | round(2) }}
        {% else %}
          0
        {% endif %}

    - name: "WP COP Warmwasser monatlich"
      unique_id: wp_cop_dhw_monthly
      state_class: measurement
      icon: mdi:water-boiler
      state: >
        {% set th = states('sensor.wp_ww_thermisch_monatlich') | float(0) %}
        {% set el = states('sensor.wp_strom_monatlich') | float(0) %}
        {% if el > 1 %}
          {{ (th / el) | round(2) }}
        {% else %}
          0
        {% endif %}

    - name: "WP COP kombiniert monatlich"
      unique_id: wp_cop_combined_monthly
      state_class: measurement
      icon: mdi:heat-pump-outline
      state: >
        {% set th_h = states('sensor.wp_heizung_thermisch_monatlich') | float(0) %}
        {% set th_w = states('sensor.wp_ww_thermisch_monatlich') | float(0) %}
        {% set el = states('sensor.wp_strom_monatlich') | float(0) %}
        {% if el > 1 %}
          {{ ((th_h + th_w) / el) | round(2) }}
        {% else %}
          0
        {% endif %}

    - name: "WP COP Heizung gesamt"
      unique_id: wp_cop_heating_total
      state_class: measurement
      icon: mdi:heat-pump
      state: >
        {% set th = states('sensor.wp_heizung_thermisch_gesamt') | float(0) %}
        {% set el = states('sensor.wp_strom_gesamt') | float(0) %}
        {% if el > 1 %}
          {{ (th / el) | round(2) }}
        {% else %}
          0
        {% endif %}

    - name: "WP COP Warmwasser gesamt"
      unique_id: wp_cop_dhw_total
      state_class: measurement
      icon: mdi:water-boiler
      state: >
        {% set th = states('sensor.wp_ww_thermisch_gesamt') | float(0) %}
        {% set el = states('sensor.wp_strom_gesamt') | float(0) %}
        {% if el > 1 %}
          {{ (th / el) | round(2) }}
        {% else %}
          0
        {% endif %}

    - name: "WP COP kombiniert gesamt"
      unique_id: wp_cop_combined_total
      state_class: measurement
      icon: mdi:heat-pump-outline
      state: >
        {% set th_h = states('sensor.wp_heizung_thermisch_gesamt') | float(0) %}
        {% set th_w = states('sensor.wp_ww_thermisch_gesamt') | float(0) %}
        {% set el = states('sensor.wp_strom_gesamt') | float(0) %}
        {% if el > 1 %}
          {{ ((th_h + th_w) / el) | round(2) }}
        {% else %}
          0
        {% endif %}
