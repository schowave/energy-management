# Jalousie-Automationen
- id: jalousien_abends_schliessen
  alias: "Jalousien abends schließen"
  description: >-
    Schließt alle Jalousien 1 Stunde nach Sonnenuntergang.
    Ausnahmen: Schlafzimmer DG, Kinderzimmer 1+2, Küche.
  trigger:
    - platform: sun
      event: sunset
      offset: "+01:00:00"
  action:
    - service: cover.close_cover
      target:
        entity_id:
          # DG
          - cover.dg_bad_jalousie
          - cover.dg_buero_jalousie
          - cover.dg_schlafen_jalousie_2
          # EG
          - cover.eg_diele_jalousie_1
          - cover.eg_diele_jalousie_2
          - cover.eg_essen_jalousie
          - cover.eg_wc_jalousie
          - cover.eg_wohnen_jalousie_1
          - cover.eg_wohnen_jalousie_2
          # OG
          - cover.og_ankleide_jalousie_1
          - cover.og_ankleide_jalousie_2
          - cover.og_bad_jalousie_1
          - cover.og_bad_jalousie_2
          - cover.og_flur_jalousie
    # Warten bis Wohnzimmer/Esszimmer geschlossen sind
    - wait_for_trigger:
        - platform: state
          entity_id:
            - cover.eg_wohnen_jalousie_1
            - cover.eg_wohnen_jalousie_2
            - cover.eg_essen_jalousie
          to: "closed"
      timeout: "00:02:00"
    # Wohnzimmer + Esszimmer leicht öffnen (Spalt für Frischluft)
    - service: cover.set_cover_position
      target:
        entity_id:
          - cover.eg_wohnen_jalousie_1
          - cover.eg_wohnen_jalousie_2
          - cover.eg_essen_jalousie
      data:
        position: 2
  mode: single

# ── WP Strom-Tarif nach Betriebsmodus umschalten ──
- id: wp_strom_tarif_umschalten
  alias: "WP Strom-Tarif nach Betriebsmodus"
  description: >-
    Schaltet den Utility-Meter-Tarif basierend auf dem
    WP-Betriebsmodus um (0=Heizen, 1=Warmwasser, sonst=Sonstig).
  trigger:
    - platform: state
      entity_id: sensor.licv_8_2r1_3_operation_mode
  action:
    - variables:
        mode: "{{ trigger.to_state.state | float(99) | int }}"
        tarif: >-
          {% if mode == 0 %}heizen
          {% elif mode == 1 %}warmwasser
          {% else %}sonstig{% endif %}
    - service: select.select_option
      target:
        entity_id:
          - select.wp_strom_modus_monatlich
          - select.wp_strom_modus_gesamt
      data:
        option: "{{ tarif }}"
  mode: single

# ── PV-Überschuss → Warmwasser aufheizen ──
- id: pv_ueberschuss_warmwasser
  alias: "PV-Überschuss → Warmwasser aufheizen"
  description: >-
    Aktiviert Extra-Warmwasser wenn Batterie voll und PV-Überschuss vorhanden.
    Schaltet ab wenn Batterie sinkt, WW warm genug oder kein Überschuss mehr.
  trigger:
    # Einschalten: Batterie voll + Export + WW kalt
    - platform: numeric_state
      entity_id: sensor.battery_level
      above: 95
      id: batterie_voll
    - platform: numeric_state
      entity_id: sensor.export_power
      above: 500
      id: export_hoch
    # Ausschalten: Batterie sinkt
    - platform: numeric_state
      entity_id: sensor.battery_level
      below: 90
      id: batterie_sinkt
    # Ausschalten: Kein Überschuss mehr
    - platform: numeric_state
      entity_id: sensor.export_power
      below: 100
      for: "00:05:00"
      id: export_niedrig
    # Ausschalten: WW warm genug
    - platform: numeric_state
      entity_id: sensor.licv_8_2r1_3_dhw
      above: 48
      id: ww_warm
  condition: []
  action:
    - choose:
        # ── Einschalten ──
        - conditions:
            - condition: trigger
              id:
                - batterie_voll
                - export_hoch
            - condition: numeric_state
              entity_id: sensor.battery_level
              above: 95
            - condition: numeric_state
              entity_id: sensor.export_power
              above: 500
            - condition: numeric_state
              entity_id: sensor.licv_8_2r1_3_dhw
              below: 45
            - condition: state
              entity_id: switch.licv_8_2r1_3_extra_dhw
              state: "off"
          sequence:
            - service: switch.turn_on
              target:
                entity_id: switch.licv_8_2r1_3_extra_dhw
            - service: persistent_notification.create
              data:
                title: "PV → Warmwasser"
                message: >-
                  Extra-WW gestartet (Batterie {{ states('sensor.battery_level') }}%,
                  Export {{ states('sensor.export_power') }}W,
                  WW {{ states('sensor.licv_8_2r1_3_dhw') }}°C)
        # ── Ausschalten ──
        - conditions:
            - condition: trigger
              id:
                - batterie_sinkt
                - export_niedrig
                - ww_warm
            - condition: state
              entity_id: switch.licv_8_2r1_3_extra_dhw
              state: "on"
          sequence:
            - service: switch.turn_off
              target:
                entity_id: switch.licv_8_2r1_3_extra_dhw
            - service: persistent_notification.create
              data:
                title: "PV → Warmwasser"
                message: >-
                  Extra-WW gestoppt ({{ trigger.id }}: Batterie {{ states('sensor.battery_level') }}%,
                  Export {{ states('sensor.export_power') }}W,
                  WW {{ states('sensor.licv_8_2r1_3_dhw') }}°C)
  mode: single
