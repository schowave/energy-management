# ── Wärmepumpe COP-Tracking ──────────────────────
# Monatliche Zähler für COP-Berechnung (Heizung / WW / Kombiniert)
# Thermische Energie: myUplink (inkl. Heizstab, _2 Varianten)
# Elektrische Energie: Shelly 3EM

# ── Monatlich ─────────────────────────────────────
wp_strom_monatlich:
  source: sensor.kg_technik_waermepumpe_3em_energie
  name: "WP Strom monatlich"
  cycle: monthly

wp_heizung_thermisch_monatlich:
  source: sensor.licv_8_2r1_3_heating_2
  name: "WP Heizung thermisch monatlich"
  cycle: monthly

wp_ww_thermisch_monatlich:
  source: sensor.licv_8_2r1_3_domestic_hot_water_2
  name: "WP Warmwasser thermisch monatlich"
  cycle: monthly

# ── Monatlich nach Modus (Tarif-basiert) ─────────
wp_strom_modus_monatlich:
  source: sensor.kg_technik_waermepumpe_3em_energie
  name: "WP Strom nach Modus monatlich"
  cycle: monthly
  tariffs:
    - heizen
    - warmwasser
    - sonstig

# ── Gesamt nach Modus (Tarif-basiert, kein Reset) ─
wp_strom_modus_gesamt:
  source: sensor.kg_technik_waermepumpe_3em_energie
  name: "WP Strom nach Modus gesamt"
  tariffs:
    - heizen
    - warmwasser
    - sonstig

# ── Gesamt (seit Tracking-Start, kein Reset) ─────
wp_strom_gesamt:
  source: sensor.kg_technik_waermepumpe_3em_energie
  name: "WP Strom gesamt (seit Tracking)"

wp_heizung_thermisch_gesamt:
  source: sensor.licv_8_2r1_3_heating_2
  name: "WP Heizung thermisch gesamt (seit Tracking)"

wp_ww_thermisch_gesamt:
  source: sensor.licv_8_2r1_3_domestic_hot_water_2
  name: "WP Warmwasser thermisch gesamt (seit Tracking)"

# ── 1komma5° vs EMHASS Kostenvergleich ─────────────
# Batterie-Entscheidungsvergleich
1k5_real_kosten_tag:
  source: sensor.1k5_netzbezugskosten_kumuliert
  name: "1k5 Real Kosten Tag"
  cycle: daily

emhass_theo_kosten_tag:
  source: sensor.emhass_theo_kosten_kumuliert
  name: "EMHASS Theo Kosten Tag"
  cycle: daily

1k5_real_kosten_woche:
  source: sensor.1k5_netzbezugskosten_kumuliert
  name: "1k5 Real Kosten Woche"
  cycle: weekly

emhass_theo_kosten_woche:
  source: sensor.emhass_theo_kosten_kumuliert
  name: "EMHASS Theo Kosten Woche"
  cycle: weekly

1k5_real_kosten_monat:
  source: sensor.1k5_netzbezugskosten_kumuliert
  name: "1k5 Real Kosten Monat"
  cycle: monthly

emhass_theo_kosten_monat:
  source: sensor.emhass_theo_kosten_kumuliert
  name: "EMHASS Theo Kosten Monat"
  cycle: monthly

# Wärmepumpen-Tracking
wp_stromkosten_tag:
