# Batterie-Steuerung
batterie_zwangsladen:
  alias: "Batterie Zwangsladen"
  description: "Startet Zwangsladen für die gewählte Dauer, danach zurück auf Eigenverbrauch"
  icon: mdi:battery-charging-high
  mode: restart
  fields:
    dauer_stunden:
      name: "Dauer (Stunden)"
      description: "Wie lange soll geladen werden?"
      default: 2
      selector:
        number:
          min: 0.5
          max: 8
          step: 0.5
          unit_of_measurement: h
    ladeleistung:
      name: "Ladeleistung (Watt)"
      description: "Ladeleistung in Watt"
      default: 5000
      selector:
        number:
          min: 1000
          max: 10600
          step: 500
          unit_of_measurement: W
  sequence:
    # Ladeleistung setzen
    - service: number.set_value
      target:
        entity_id: number.battery_forced_charge_discharge_power
      data:
        value: "{{ ladeleistung | int }}"
    # Zwangsladen aktivieren
    - service: scene.turn_on
      target:
        entity_id: scene.battery_forced_charge
    # Warten
    - delay:
        hours: "{{ dauer_stunden | int }}"
        minutes: "{{ ((dauer_stunden | float % 1) * 60) | int }}"
    # Zurück auf Eigenverbrauch
    - service: scene.turn_on
      target:
        entity_id: scene.self_consumption_mode_max_battery_discharge
