
# Loads default set of integrations. Do not remove.
default_config:

homeassistant:
  name: Home
  unit_system: metric
  currency: EUR
  country: DE
  time_zone: Europe/Berlin
  packages:
    sungrow: !include modbus_sungrow.yaml
    emhass: !include emhass.yaml

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

template: !include template_sensors.yaml

utility_meter: !include utility_meter.yaml

input_select:
  dashboard_zeitraum:
    name: "Dashboard Zeitraum"
    options:
      - "Heute"
      - "3 Tage"
      - "7 Tage"
    initial: "Heute"
    icon: mdi:calendar-range

input_number:
  einspeiseverguetung:
    name: "Einspeisevergütung"
    min: 0
    max: 0.20
    step: 0.001
    unit_of_measurement: "EUR/kWh"
    icon: mdi:currency-eur
    initial: 0.082

sensor:
  # ── Riemann-Summe: EUR/h → kumulierte EUR ────────
  - platform: integration
    source: sensor.1k5_netzbezugskosten_laufend
    name: "1k5 Netzbezugskosten kumuliert"
    unit_prefix: ""
    round: 4
    method: left

  - platform: integration
    source: sensor.emhass_theo_kosten_laufend
    name: "EMHASS Theo Kosten kumuliert"
    unit_prefix: ""
    round: 4
    method: left

  - platform: integration
    source: sensor.entscheidungs_delta_laufend
    name: "Entscheidungs-Delta kumuliert"
    unit_prefix: ""
    round: 4
    method: left

  - platform: integration
    source: sensor.wp_stromkosten_laufend
    name: "WP Stromkosten kumuliert"
    unit_prefix: ""
    round: 4
    method: left

  - platform: integration
    source: sensor.wp_einsparpotenzial_laufend
    name: "WP Einsparpotenzial kumuliert"
    unit_prefix: ""
    round: 4
    method: left

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.30.33.0/24

# InfluxDB: Wird seit HA 2026.9 über UI-Integration konfiguriert
# Einstellungen → Geräte & Dienste → InfluxDB
# Host: a0d7b954-influxdb, Port: 8086, Database: homeassistant

recorder:
  purge_keep_days: 365
  commit_interval: 5