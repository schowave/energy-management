
# Loads default set of integrations. Do not remove.
default_config:

homeassistant:
  name: Home
  unit_system: metric
  currency: EUR
  country: DE
  time_zone: Europe/Berlin
  packages:
    sungrow: !include modbus_sungrow.yaml

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.30.33.0/24

# InfluxDB: Wird seit HA 2026.9 über UI-Integration konfiguriert
# Einstellungen → Geräte & Dienste → InfluxDB
# Host: a0d7b954-influxdb, Port: 8086, Database: homeassistant

recorder:
  purge_keep_days: 365
  commit_interval: 5