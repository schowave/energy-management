
# Loads default set of integrations. Do not remove.
default_config:

homeassistant:
  name: Home
  unit_system: metric
  currency: EUR
  country: DE
  time_zone: Europe/Berlin
  packages:
    sungrow: !include modbus_sungrow.yaml
    emhass: !include emhass.yaml

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

template: !include template_sensors.yaml

utility_meter: !include utility_meter.yaml

input_select:
  dashboard_zeitraum:
    name: "Dashboard Zeitraum"
    options:
      - "Heute"
      - "3 Tage"
      - "7 Tage"
    initial: "Heute"
    icon: mdi:calendar-range

input_number:
  einspeiseverguetung:
    name: "Einspeisevergütung"
    min: 0
    max: 0.20
    step: 0.001
    unit_of_measurement: "EUR/kWh"
    icon: mdi:currency-eur
    initial: 0.082

  emhass_theo_soc:
    name: "EMHASS Theo SOC"
    min: 0
    max: 100
    step: 0.1
    unit_of_measurement: "%"
    icon: mdi:battery-sync
    initial: 50

# Luxtronik (Novelan LICV 8.2) — lokale Steuerung via BenPru Integration
luxtronik:
  host: 192.168.1.225
  port: 8889

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.30.33.0/24

# InfluxDB: Wird seit HA 2026.9 über UI-Integration konfiguriert
# Einstellungen → Geräte & Dienste → InfluxDB
# Host: a0d7b954-influxdb, Port: 8086, Database: homeassistant

recorder:
  purge_keep_days: 365
  commit_interval: 5